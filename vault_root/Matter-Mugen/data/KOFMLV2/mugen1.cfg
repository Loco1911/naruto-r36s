;-=====================================================-
;       Configuration file for KOF MEMORIAL.exe
;-=====================================================-
;-------------------------------------------------------
[Options]
; Basic options
Difficulty = 8
Life = 80
Time = 99
GameSpeed = 0
Team.1VS2Life = 300
Team.LoseOnKO = 1
motif = data/system.def

;-------------------------------------------------------
[Rules]
GameType = VS
Default.Attack.LifeToPowerMul = .7
Default.GetHit.LifeToPowerMul = .6
Super.TargetDefenceMul = 1.5

;-------------------------------------------------------
[Config]
GameSpeed = 60
GameWidth = 640
GameHeight = 480
Language = "en"
DrawShadows = 1
AfterImageMax = 16
LayeredSpriteMax = 256
SpriteDecompressionBufferSize = 16384
ExplodMax = 256
SysExplodMax = 128
HelperMax = 56
PlayerProjectileMax = 32
FirstRun = 0
;-------------------------------------------------------
[Debug]
Debug = 1
AllowDebugMode = 1
AllowDebugKeys = 1
Speedup = 0
StartStage = stages/stage0.def

;-------------------------------------------------------
[Video]
Depth = 16
VRetrace = 0
FullScreen = 1
BlitMode = Normal
RenderMode = System
;System
;OpenGLScreen
;-------------------------------------------------------
[Sound]
Sound = 1
SampleRate = 48000
BufferSize = 11
StereoEffects = 1
PanningWidth = 240
ReverseStereo = 0
WavChannels = 16
MasterVolume = 100
WavVolume = 90
BGMVolume = 45
SFXResampleMethod = libresample
SFXResampleQuality = 1
BGMResampleQuality = 1

[Music]
plugin = mpg123
rva = track
extensions =
volume = 100.0

plugin = vorbisplug, plugins/vorbisplug.dll
rva = track
extensions = 
volume = 100.0

plugin = sdlmix
midivolume =
modvolume = 

;-------------------------------------------------------
[Misc]
PlayerCache = 4
Precache = 1
BufferedRead = 1
UnloadSystem = 0
SFXBackgroundMode = Play
BGMBackgroundMode = Play

;-------------------------------------------------------
[Arcade]
AI.RandomColor = 0
AI.Cheat = 1
arcade.AIramp.start = 2, 0
arcade.AIramp.end   = 4, 2

 ;Team Mode AI ramping
team.AIramp.start = 1, 0
team.AIramp.end   = 3, 2

 ;Survival Mode AI ramping
survival.AIramp.start = 0, -3
survival.AIramp.end   = 16, 4


;-------------------------------------------------------
[Input]
P1.UseKeyboard = 1
P2.UseKeyboard = 1
;Joystick type:
;0 - Disable
;1 - Autodetect (not reliable under DOS)
;4 - 4 button
;6 - 6 button
;8 - 8 button
;20 - Sidewinder
;21 - SNESKey
;22 - PSX pad
;23 - N64 pad
P1.Joystick.type = 1
P2.Joystick.type = 1
ForceFeedback = 0    ;True to enable force feedback (DOS only)

