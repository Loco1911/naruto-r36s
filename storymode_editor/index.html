<script>
const {createApp} = Vue;
createApp({
    data() { return {
        projectRoot:null, pickerCurrent:"~", pickerParent:"~", pickerDirs:[], pickerLoading:false, rootError:"", loading:false,
        catalog:[], assets:{chars:[],stages:[],storyboard_defs:[],storyboard_sffs:[],storyboard_sounds:[]},
        selectedArcIndex:-1, selectedChapterIndex:-1, activeTab:'editor',
        // Global State & Undo/Redo
        history:[], historyIndex:-1, isRestoringState:false, globalSaveTimeout:null, dataIsLoading:false,
        // Storyboard tab
        storyboardList:[], selectedSBPath:'', selectedSB:null,
        sbForm:{name:'',saga:'General',spr:'',snd:'',duration:300},
        sbMsg:'', sbMsgOk:true,
        // Chars/Stages
        charRoster:[], charAvailable:[], charSearch:'',
        charRosterSaveTimeout: null,
        charRosterLoading: false,
        stageRoster:[], stageAvailable:[], stageUnused:[], stageSearch:'', stageNameMap:{},
        lifebars:[], lifebarSearch:'', selectedLifebarId:'', lifebarActiveId:'', lifebarMotif:null, lifebarMigration:null, lifebarLoading:false,
        sel:{chars:new Set(),stages:new Set()}, lastClicked:{chars:-1,stages:-1}, tick:0,
        editIdx:{chars:-1,stages:-1}, editName:'',
        renameOld:'', renameNew:'', renameDisk:true,
        displaynameScan:{loading:false, applying:false, scanned:false, items:[]},
        replaceCharTarget:'', selectedAvailableCharName:'',
        charPreview:{
            loading:false,
            error:'',
            status:'Selecciona un personaje',
            displayName:'',
            source:'',
            imageUrl:'',
            mugshotUrl:'',
            frameCount:0,
            sffVersion:''
        },
        charPreviewCache:{},
        charPreviewPlayer:{
            rafId:0,
            token:0,
            frames:[],
            loopStart:0,
            bounds:null,
            frameIndex:0,
            frameElapsed:0,
            lastTs:0
        },
        msg:{chars:'',stages:'',lifebars:''}, msgType:{chars:'ok',stages:'ok',lifebars:'ok'},
        dragState:{type:null,idx:null,source:null,item:null,removeUnusedName:''},
        storyDragIndex:-1, storyDropIndex:-1,
        movelistChars:[], movelistSearch:'', selectedMovelistChar:'', movelistEditor:null,
        movelistLoading:false, movelistGenerating:false, movelistMsg:'', movelistMsgOk:true
    }},
    computed: {
        rosterNamesSet(){
            return new Set(
                this.charRoster
                    .filter(item=>this.isCharEntry(item))
                    .map(item=>this.rosterCharRef(item))
                    .filter(name=>name&&name!=='null'&&name!=='randomselect')
            );
        },
        currentArc(){ return this.selectedArcIndex>=0?this.catalog[this.selectedArcIndex]:null },
        currentChapter(){ return this.currentArc&&this.currentArc.chapters&&this.selectedChapterIndex>=0&&this.selectedChapterIndex<this.currentArc.chapters.length?this.currentArc.chapters[this.selectedChapterIndex]:null },
        currentArcChapterMap(){ return this.buildChapterVisualMap(this.currentArc) },
        currentChapterVisual(){
            if(this.selectedChapterIndex<0)return null;
            return this.currentArcChapterMap[this.selectedChapterIndex]||null;
        },
        availableSideParents(){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters))return [];
            const map=this.currentArcChapterMap||{};
            return this.currentArc.chapters
                .map((chapter,idx)=>({
                    idx,
                    id:chapter&&chapter.id?chapter.id:'',
                    label:`${((this.currentArcChapterMap[idx]||{}).label)||(idx+1)} · ${chapter.title||chapter.id||('Cap '+(idx+1))}`
                }))
                .filter(opt=>opt.idx!==this.selectedChapterIndex&&opt.id)
                .filter(opt=>this.selectedChapterIndex<0 || !this.isChapterDescendant(this.currentArc,opt.idx,this.selectedChapterIndex,map))
                .sort((a,b)=>((map[a.idx]||{}).column||0)-((map[b.idx]||{}).column||0));
        },
        battleFormat(){
            if(!this.currentChapter)return '1v1';
            return this.currentChapter.battleFormat||'1v1';
        },
        maxTeamSize(){
            const f=this.battleFormat;
            if(f==='3v3'||f==='tag')return 3;
            return 1;
        },
        projectName(){ if(!this.projectRoot)return''; const p=this.projectRoot.replace(/\\/g,'/').split('/').filter(Boolean); return p[p.length-1]||'Proyecto' },
        filteredCharRoster(){
            const q=this.charSearch.trim().toLowerCase();
            return this.charRoster
                .map((item,idx)=>({item,idx}))
                .filter(row=>{
                    if(!q)return true;
                    const text=this.isLabelEntry(row.item)?(row.item.label||''):(row.item.name||'');
                    return text.toLowerCase().includes(q);
                });
        },
        installedCharChoices(){
            return (this.charAvailable||[])
                .filter(item=>item&&item.type==='folder'&&item.has_def)
                .map(item=>item.name)
                .sort((a,b)=>String(a).localeCompare(String(b),undefined,{sensitivity:'base'}));
        },
        realCharCount(){
            return this.charRoster.filter(item=>this.isCharEntry(item)).length;
        },
        charLabelCount(){
            return this.charRoster.filter(item=>this.isLabelEntry(item)).length;
        },
        charPreviewTarget(){
            void this.tick;
            const selected = Array.from(this.sel.chars)
                .filter(i=>Number.isInteger(i)&&i>=0&&i<this.charRoster.length)
                .sort((a,b)=>a-b);
            if(selected.length>0){
                const preferred = selected.includes(this.lastClicked.chars) ? this.lastClicked.chars : selected[selected.length-1];
                const item = this.charRoster[preferred];
                const name = this.isCharEntry(item) ? this.normalizeText(item.name) : '';
                if(name && name !== 'null' && name !== 'randomselect'){
                    return {
                        name,
                        ref:this.rosterCharRef(item),
                        label:name,
                        source:'roster'
                    };
                }
            }
            const diskName = this.normalizeText(this.selectedAvailableCharName);
            if(diskName){
                return {name:diskName, ref:diskName, label:diskName, source:'disk'};
            }
            return null;
        },
        selectedRenameIndices(){
            void this.tick;
            return Array.from(this.sel.chars)
                .filter(i=>Number.isInteger(i)&&i>=0&&i<this.charRoster.length)
                .sort((a,b)=>a-b);
        },
        selectedRenameTarget(){
            const selected=this.selectedRenameIndices;
            if(selected.length===1){
                const idx=selected[0];
                const item=this.charRoster[idx];
                if(this.isCharEntry(item)){
                    const name=this.normalizeText(item.name);
                    if(name&&name!=='null'&&name!=='randomselect'){
                        return {
                            idx,
                            name,
                            ref:this.rosterCharRef(item)||name,
                            locked:this.isSlotLocked(item),
                            source:'roster'
                        };
                    }
                }
            }
            /* Fall through: check disk selection */
            if(selected.length===0){
                const diskName=this.normalizeText(this.selectedAvailableCharName);
                if(diskName){
                    return {
                        idx:-1,
                        name:diskName,
                        ref:diskName,
                        locked:false,
                        source:'disk'
                    };
                }
            }
            return null;
        },
        renameSelectionHint(){
            const count=this.selectedRenameIndices.length;
            if(count===0&&!this.selectedAvailableCharName)return 'Selecciona un personaje del roster o de disco';
            if(count>1)return 'Selecciona un solo personaje';
            return 'El slot seleccionado no es un personaje renombrable';
        },
        canRenameSelectedChar(){
            const target=this.selectedRenameTarget;
            if(!target)return false;
            if(target.locked)return false;
            if(!this.normalizeText(this.renameNew))return false;
            /* disk chars always rename on disk; roster chars require the checkbox */
            if(target.source==='roster'&&!this.renameDisk)return false;
            return true;
        },
        portraitOffsetTarget(){
            void this.tick;
            const selected=Array.from(this.sel.chars)
                .filter(i=>Number.isInteger(i)&&i>=0&&i<this.charRoster.length)
                .sort((a,b)=>a-b);
            if(selected.length!==1)return null;
            const idx=selected[0];
            const item=this.charRoster[idx];
            if(!this.isCharEntry(item))return null;
            const name=this.normalizeText(item.name);
            if(!name||name==='null'||name==='randomselect')return null;
            const ep=item.extra_params||[];
            const getVal=(key)=>{
                const prefix=key.toLowerCase()+'=';
                for(const p of ep){
                    if(p.toLowerCase().startsWith(prefix)){
                        const v=parseFloat(p.split('=')[1]);
                        return Number.isFinite(v)?v:0;
                    }
                }
                return 0;
            };
            return {
                idx,
                name,
                offsetX:getVal('select_portrait_offset_x'),
                offsetY:getVal('select_portrait_offset_y'),
                scale:getVal('select_portrait_scale')||0,
            };
        },
        charPreviewKey(){
            const target = this.charPreviewTarget;
            return target ? `${target.source}:${target.ref||target.name}:${target.label||''}` : '';
        },
        filteredStageRoster(){ if(!this.stageSearch)return this.stageRoster; const q=this.stageSearch.toLowerCase();return this.stageRoster.filter(s=>(this.stageNameMap[s]||s).toLowerCase().includes(q)) },
        filteredLifebars(){
            const q=this.lifebarSearch.trim().toLowerCase();
            return this.lifebars.filter(item=>{
                if(!q)return true;
                return [item.title, item.id, item.author, item.main_def_path].some(value=>(value||'').toLowerCase().includes(q));
            });
        },
        selectedLifebar(){
            return this.lifebars.find(item=>item.id===this.selectedLifebarId) || null;
        },
        activeLifebar(){
            return this.lifebars.find(item=>item.id===this.lifebarActiveId) || null;
        },
        uniqueEnemies(){ if(!this.currentArc||!this.currentArc.chapters)return 0;const s=new Set();this.currentArc.chapters.forEach(ch=>(ch.p2||[]).forEach(p=>s.add(p)));return s.size },
        storyboardSagas(){ const s=new Set();this.storyboardList.forEach(x=>s.add(x.saga));return Array.from(s).sort() },
        sbAssetList(){ const a=[];this.storyboardList.forEach(sb=>{if(sb.spr)a.push(sb.spr);if(sb.snd)a.push(sb.snd)});return[...new Set(a)].sort() },
        timelineConnections(){
            if(!this.currentArc||!this.currentArc.chapters)return[];
            const links=[];
            const map=this.currentArcChapterMap||{};
            let lastMain=-1;
            this.currentArc.chapters.forEach((cap,idx)=>{
                const isSide=(cap.type||'normal')==='sidestory';
                const info=map[idx]||{};
                if(isSide && info.parentIdx>=0){
                    // Only draw parent→child connector for the FIRST sibling in each lane
                    const parentInfo=map[info.parentIdx]||{};
                    const siblings=(parentInfo.childGroups||{})[info.lane]||[];
                    if(siblings.length===0 || siblings[0]===idx){
                        links.push({from:info.parentIdx,to:idx,type:'side'});
                    }
                }else if(!isSide){
                    if(lastMain>=0) links.push({from:lastMain,to:idx,type:'main'});
                    lastMain=idx;
                }
            });
            // Add sibling horizontal links
            const values=Object.values(map);
            values.forEach(info=>{
                const groups=info.childGroups||{};
                Object.values(groups).forEach(group=>{
                    for(let i=1;i<group.length;i++){
                        links.push({from:group[i-1],to:group[i],type:'sibling'});
                    }
                });
            });
            return links;
        },
        currentArcTimelineHeight(){
            const map=this.currentArcChapterMap||{};
            const values=Object.values(map);
            let maxLane=0;
            values.forEach(info=>{ maxLane=Math.max(maxLane, info.lane||0); });
            const layout=this.timelineLayout();
            return Math.max(layout.minHeight, layout.topY + maxLane * layout.laneSpacing + layout.bottomPadding);
        },
        currentArcTimelineViewportHeight(){
            return Math.min(560, Math.max(360, this.currentArcTimelineHeight));
        },
        currentArcTimelineWidth(){
            const map=this.currentArcChapterMap||{};
            const values=Object.values(map);
            let maxCol=0;
            values.forEach(info=>{ maxCol=Math.max(maxCol, info.column||0); });
            const layout=this.timelineLayout();
            return Math.max(layout.minWidth, layout.startX + (maxCol * layout.colSpacing) + layout.sidePadding);
        },
        filteredMovelistChars(){
            const q=this.movelistSearch.trim().toLowerCase();
            return this.movelistChars.filter(char=>!q || char.name.toLowerCase().includes(q));
        },
        selectedMovelistMeta(){
            return this.movelistChars.find(char=>char.name===this.selectedMovelistChar) || null;
        },
        movelistTotalMoves(){
            if(!this.movelistEditor||!Array.isArray(this.movelistEditor.sections))return 0;
            return this.movelistEditor.sections.reduce((total, section)=>total + ((section.moves||[]).length), 0);
        }
    },
    watch: {
        charRoster: { deep: true, handler() { this.onStateChange(); } },
        catalog: { deep: true, handler() { this.onStateChange(); } },
        stageRoster: { deep: true, handler() { this.onStateChange(); } },
        movelistEditor: { deep: true, handler() { this.onStateChange(); } },
        charPreviewKey(){
            if(this.activeTab === 'chars'){
                this.reloadCharPreview();
            }
        },
        activeTab(nextTab){
            if(nextTab === 'chars'){
                this.reloadCharPreview();
                return;
            }
            this.stopCharPreviewAnimation();
        }
    },
    methods: {
        timelineLayout(){
            return {
                startX: 28,
                topY: 72,
                colSpacing: 176,
                laneSpacing: 136,
                sidePadding: 176,
                bottomPadding: 176,
                minWidth: 760,
                minHeight: 360
            };
        },
        nodeX(idx){
            const layout=this.timelineLayout();
            const info=this.currentArcChapterMap[idx]||{};
            const col=info.column||0;
            return layout.startX + col * layout.colSpacing;
        },
        nodeY(idx){
            const layout=this.timelineLayout();
            const info=this.currentArcChapterMap[idx]||{};
            return layout.topY + (info.lane||0) * layout.laneSpacing;
        },
        // ── Node helpers ──
        lettersForIndex(n){
            let value=Math.max(1, Number(n)||1);
            let out='';
            while(value>0){
                const rem=(value-1)%26;
                out=String.fromCharCode(65+rem)+out;
                value=Math.floor((value-1)/26);
            }
            return out;
        },
        buildChapterVisualMap(arc){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            const idToIdx=new Map();
            const parentOf={};
            const childrenOf={};
            const labels={};
            const mainOrder=[];
            const laneOf={};
            const depthOf={};
            const addChild=(parentIdx,childIdx)=>{
                if(parentIdx==null||parentIdx<0||parentIdx===childIdx)return;
                if(!childrenOf[parentIdx])childrenOf[parentIdx]=[];
                childrenOf[parentIdx].push(childIdx);
                parentOf[childIdx]=parentIdx;
            };
            const resolveParentIndex=(idx)=>{
                const chapter=chapters[idx]||{};
                let parentIdx=-1;
                if(chapter.sideUnlockAfter&&idToIdx.has(chapter.sideUnlockAfter))parentIdx=idToIdx.get(chapter.sideUnlockAfter);
                if(parentIdx<0){
                    for(let j=idx-1;j>=0;j--){
                        if((((chapters[j] || {}).type)||'normal')!=='sidestory'){
                            parentIdx=j;
                            break;
                        }
                    }
                }
                return parentIdx;
            };

            chapters.forEach((chapter,idx)=>{
                if(chapter&&chapter.id)idToIdx.set(chapter.id,idx);
                if((((chapter || {}).type)||'normal')!=='sidestory'){
                    mainOrder.push(idx);
                    labels[idx]=String(mainOrder.length);
                    laneOf[idx]=0;
                    depthOf[idx]=0;
                }
            });

            chapters.forEach((chapter,idx)=>{
                if((((chapter || {}).type)||'normal')!=='sidestory')return;
                const parentIdx=resolveParentIndex(idx);
                if(parentIdx>=0)addChild(parentIdx,idx);
            });

            Object.values(childrenOf).forEach(list=>list.sort((a,b)=>a-b));

            const assignChildrenLanes=(parentIdx)=>{
                const children=childrenOf[parentIdx]||[];
                if(children.length===0)return;
                const parentLane=laneOf[parentIdx]||0;
                const parentDepth=depthOf[parentIdx]||0;
                children.forEach((childIdx,pos)=>{
                    laneOf[childIdx]=parentLane+1;
                    depthOf[childIdx]=parentDepth+1;
                    labels[childIdx]=`${labels[parentIdx]||'1'}${this.lettersForIndex(pos+1)}`;
                    assignChildrenLanes(childIdx);
                });
            };

            mainOrder.forEach(assignChildrenLanes);

            let orphanCount=0;
            chapters.forEach((chapter,idx)=>{
                if(((((chapter || {}).type)||'normal')!=='sidestory')||parentOf[idx]!=null)return;
                orphanCount+=1;
                laneOf[idx]=1;
                depthOf[idx]=1;
                labels[idx]=`1${this.lettersForIndex(orphanCount)}`;
                assignChildrenLanes(idx);
            });

            const columnOf={};
            let nextCol=0;
            const childGroupsOf={}; // parentIdx -> { lane: [childIdx, ...] }

            const getSiblingGroups=(parentIdx)=>{
                const children=childrenOf[parentIdx]||[];
                if(children.length===0)return{};
                const byLane={};
                children.forEach(childIdx=>{
                    const lane=laneOf[childIdx]||1;
                    if(!byLane[lane])byLane[lane]=[];
                    byLane[lane].push(childIdx);
                });
                return byLane;
            };

            const assignColumnsRecursive=(idx)=>{
                columnOf[idx]=nextCol;
                nextCol++;
                const groups=getSiblingGroups(idx);
                childGroupsOf[idx]=groups;
                const lanes=Object.keys(groups).map(Number).sort((a,b)=>a-b);
                lanes.forEach(lane=>{
                    groups[lane].forEach(childIdx=>{
                        assignColumnsRecursive(childIdx);
                    });
                });
            };

            mainOrder.forEach(assignColumnsRecursive);

            // Orphan sides
            chapters.forEach((chapter,idx)=>{
                if(((((chapter || {}).type)||'normal')!=='sidestory')||parentOf[idx]!=null)return;
                assignColumnsRecursive(idx);
            });

            const map={};
            chapters.forEach((chapter,idx)=>{
                const pIdx=Number.isInteger(parentOf[idx])?parentOf[idx]:-1;
                map[idx]={
                    label:labels[idx]||String(idx+1),
                    parentIdx:pIdx,
                    parentLabel:pIdx>=0?(labels[pIdx]||String(pIdx+1)):'',
                    depth:depthOf[idx]||0,
                    lane:laneOf[idx]||0,
                    column:columnOf[idx]||0,
                    childGroups:childGroupsOf[idx]||{}
                };
            });
            return map;
        },
        chapterNodeStyle(idx){
            return {left:this.nodeX(idx)+'px', top:this.nodeY(idx)+'px'};
        },
        nodeClass(type){
            const m={normal:'node-normal',sidestory:'node-sidestory',midboss:'node-midboss',finalboss:'node-finalboss'};
            return m[type]||'node-normal';
        },
        nodeEmoji(type){
            const m={normal:'📖',sidestory:'🌿',midboss:'💀',finalboss:'👑'};
            return m[type]||'📖';
        },
        nodeTypeLabel(type){
            const m={normal:'Capítulo',sidestory:'Side Story',midboss:'Mid-Boss',finalboss:'Final Boss'};
            return m[type]||'Capítulo';
        },
        typeBadgeClass(type){
            const m={normal:'badge-yellow',sidestory:'badge-blue',midboss:'badge-red',finalboss:'badge-purple'};
            return m[type]||'badge-yellow';
        },
        arcChapterCount(arc,type){ return (arc.chapters||[]).filter(c=>c.type===type).length },
        arcBossCount(arc){ return (arc.chapters||[]).filter(c=>c.type==='midboss'||c.type==='finalboss').length },
        isLabelEntry(item){ return item && item.kind==='label' },
        isCharEntry(item){ return !this.isLabelEntry(item) },
        isSlotLocked(item){ return !!(item && item.slot_locked) },
        engineStateMeta(item){
            const unlock=this.normalizeText(item&&item.unlock);
            const hidden=Number(item&&item.hidden)||0;
            if(hidden===0){
                return {
                    label:'Visible',
                    class:'bg-green-900/20 text-green-400',
                    title:'El motor muestra este personaje normalmente en el select.'
                };
            }
            if(hidden===3 && unlock){
                return {
                    label:'Story Lock',
                    class:'bg-yellow-900/30 text-yellow-300',
                    title:'Este slot está bloqueado por story mode y en el juego se muestra como random/? hasta desbloquearse.'
                };
            }
            if(hidden===3){
                return {
                    label:'Random',
                    class:'bg-blue-900/30 text-blue-300',
                    title:'Este slot se comporta como randomselect en el select.'
                };
            }
            if(hidden===2){
                return {
                    label:'Bloq.',
                    class:'bg-red-900/40 text-red-300',
                    title:'El motor mantiene este slot bloqueado/no seleccionable.'
                };
            }
            return {
                label:'Oculto',
                class:'bg-red-900/30 text-red-400',
                title:'Este slot está oculto en el select.'
            };
        },
        rosterCharRef(item){
            if(!this.isCharEntry(item))return '';
            const ref=this.normalizeText(item&&item.char_ref);
            if(ref)return ref;
            const name=this.normalizeText(item&&item.name);
            return name&&name!=='null'&&name!=='randomselect'?name:'';
        },
        charSlotNumber(idx){
            let count=0;
            for(let i=0;i<=idx;i++){
                if(this.isCharEntry(this.charRoster[i]))count+=1;
            }
            return count;
        },
        makeCharEntry(name='null',charRef=''){
            return {kind:'char',name,char_ref:charRef||'',stage:"",hidden:0,order:1,music:"",ai:0,includestage:1,unlock:"",extra_params:[],slot_locked:false};
        },
        makeInstalledCharEntry(name=''){
            const clean=this.normalizeText(name);
            return this.makeCharEntry(clean, clean);
        },
        makeLabelEntry(label='Nueva etiqueta'){
            return {kind:'label',label,slot_locked:false};
        },
        ensureChapterId(chapter,prefix='cap'){
            if(!chapter)return'';
            if(!chapter.id||!String(chapter.id).trim()){
                chapter.id=`${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
            }
            return chapter.id;
        },
        chapterParentIndex(arc,idx,map){
            const view=map||this.buildChapterVisualMap(arc);
            return view[idx]?view[idx].parentIdx:-1;
        },
        isChapterDescendant(arc,candidateIdx,ancestorIdx,map){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            let cursor=candidateIdx;
            let guard=0;
            while(cursor>=0&&guard<=chapters.length){
                if(cursor===ancestorIdx)return true;
                cursor=this.chapterParentIndex(arc,cursor,map);
                guard+=1;
            }
            return false;
        },
        getChapterBranchIndices(arc,rootIdx,map){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            if(rootIdx<0||rootIdx>=chapters.length)return [];
            const view=map||this.buildChapterVisualMap(arc);
            const branch=[rootIdx];
            const walk=(parentIdx)=>{
                chapters.forEach((_,idx)=>{
                    if((view[idx]||{}).parentIdx===parentIdx){
                        branch.push(idx);
                        walk(idx);
                    }
                });
            };
            walk(rootIdx);
            return [...new Set(branch)].sort((a,b)=>a-b);
        },
        getChapterBranchItems(arc,rootIdx,map){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            return this.getChapterBranchIndices(arc,rootIdx,map).map(idx=>chapters[idx]).filter(Boolean);
        },
        getTopLevelChapterIndex(arc,idx,map){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            if(idx<0||idx>=chapters.length)return -1;
            const view=map||this.buildChapterVisualMap(arc);
            let cursor=idx;
            let guard=0;
            while(cursor>=0&&guard<=chapters.length){
                const parentIdx=(view[cursor]||{}).parentIdx;
                if(parentIdx==null||parentIdx<0)return cursor;
                cursor=parentIdx;
                guard+=1;
            }
            return idx;
        },
        suggestedSideParentIndex(){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters)||this.currentArc.chapters.length===0)return-1;
            if(this.selectedChapterIndex>=0&&this.selectedChapterIndex<this.currentArc.chapters.length)return this.selectedChapterIndex;
            return this.currentArc.chapters.length-1;
        },
        normalizeRosterItem(item){
            if(this.isLabelEntry(item))return {...this.makeLabelEntry(item.label||'Nueva etiqueta'),...item,kind:'label'};
            const base=this.makeCharEntry(item&&item.name?item.name:'null', item&&item.char_ref?item.char_ref:'');
            const extraParams=Array.isArray(item&&item.extra_params)?item.extra_params:[];
            return {...base,...item,kind:'char',extra_params:[...extraParams],slot_locked:!!(item&&item.slot_locked)};
        },
        normalizeChapterRoundTime(ch){
            if(!ch)return;
            const raw=ch.roundTime;
            if(raw===-1 || raw==='-1' || raw==='infinite'){
                ch.roundTime=-1;
                ch.roundTimeMode='infinite';
                ch.roundTimeValue=99;
                return;
            }
            const parsed=Number(raw);
            if(Number.isFinite(parsed) && parsed > 0){
                ch.roundTime=Math.floor(parsed);
                ch.roundTimeMode='custom';
                ch.roundTimeValue=ch.roundTime;
                return;
            }
            delete ch.roundTime;
            ch.roundTimeMode='default';
            ch.roundTimeValue=99;
        },
        normalizeChapterSubstitutions(ch){
            if(!ch)return;
            const clamp=(value)=>{
                const parsed=Math.floor(Number(value));
                if(!Number.isFinite(parsed))return 3;
                if(parsed < 0)return 0;
                if(parsed > 3)return 3;
                return parsed;
            };
            ch.p1Substitutions=clamp(ch.p1Substitutions);
            ch.p2Substitutions=clamp(ch.p2Substitutions);
        },
        buildCatalogPayload(){
            return (this.catalog||[]).map(arc=>({
                ...arc,
                chapters:(arc.chapters||[]).map(ch=>{
                    const out=JSON.parse(JSON.stringify(ch));
                    this.ensureChapterId(out,'cap');
                    this.normalizeChapterSubstitutions(out);
                    if(out.roundTimeMode==='infinite'){
                        out.roundTime=-1;
                    }else if(out.roundTimeMode==='custom'){
                        const v=Math.floor(Number(out.roundTimeValue));
                        if(Number.isFinite(v) && v > 0) out.roundTime=v;
                        else delete out.roundTime;
                    }else{
                        delete out.roundTime;
                    }
                    delete out.roundTimeMode;
                    delete out.roundTimeValue;
                    return out;
                })
            }));
        },
        ensureRosterEditable(idx,action){
            const item=this.charRoster[idx];
            if(this.isSlotLocked(item)){
                this.showMsg('chars',`Slot fijo: no se puede ${action}`,'err');
                return false;
            }
            return true;
        },
        selectedCharsAllLocked(){
            if(this.sel.chars.size===0)return false;
            return Array.from(this.sel.chars).every(i=>this.isSlotLocked(this.charRoster[i]));
        },
        bulkToggleSlotLock(){
            if(this.sel.chars.size===0)return;
            this.bulkAction('chars', this.selectedCharsAllLocked() ? 'slotunlock' : 'slotlock');
        },
        clearDragState(){
            this.dragState={type:null,idx:null,source:null,item:null,removeUnusedName:''};
        },
        getSelectedInsertIndex(t){
            const list=this.getList(t);
            if(t!=='chars')return list.length;
            const selected=Array.from(this.sel.chars)
                .filter(i=>Number.isInteger(i)&&i>=0&&i<this.charRoster.length)
                .sort((a,b)=>a-b);
            if(selected.length===0)return this.charRoster.length;
            const anchor=selected.includes(this.lastClicked.chars)?this.lastClicked.chars:selected[selected.length-1];
            return Math.min(this.charRoster.length, anchor+1);
        },
        insertRosterItem(t,item,options={}){
            const list=this.getList(t);
            const rawIndex=Number.isInteger(options.index)?options.index:this.getSelectedInsertIndex(t);
            const insertAt=Math.max(0,Math.min(list.length,rawIndex));
            if(t==='chars'){
                const normalized=this.normalizeRosterItem(item);
                this.charRoster.splice(insertAt,0,normalized);
                if(options.removeUnusedName){
                    // No longer filtering unused list since charAvailable shows everything
                }
                if(options.select!==false){
                    this.sel.chars.clear();
                    this.sel.chars.add(insertAt);
                    this.lastClicked.chars=insertAt;
                    this.tick++;
                }
                return insertAt;
            }
            this.stageRoster.splice(insertAt,0,item);
            return insertAt;
        },
        buildReplacementRosterItem(targetItem,newItem){
            const incoming=this.normalizeRosterItem(newItem);
            if(!this.isCharEntry(incoming))return incoming;
            if(!this.isCharEntry(targetItem))return incoming;
            return {
                ...this.normalizeRosterItem(targetItem),
                name:incoming.name,
                char_ref:incoming.char_ref||'',
                kind:'char',
                slot_locked:!!targetItem.slot_locked
            };
        },
        startAvailableCharDrag(entry,ev){
            this.dragState={
                type:'chars',
                idx:-1,
                source:'charAvailable',
                item:this.makeInstalledCharEntry(entry.name),
                removeUnusedName:entry.name
            };
            ev.dataTransfer.effectAllowed='copyMove';
        },
        startCharTemplateDrag(kind,ev){
            let item=this.makeCharEntry('null');
            if(kind==='random')item=this.makeCharEntry('randomselect');
            else if(kind==='label')item=this.makeLabelEntry();
            this.dragState={
                type:'chars',
                idx:-1,
                source:`template:${kind}`,
                item,
                removeUnusedName:''
            };
            ev.dataTransfer.effectAllowed='copy';
        },
        computeExternalDropMode(ev){
            if(!ev||!ev.currentTarget||typeof ev.clientY!=='number')return'after';
            const rect=ev.currentTarget.getBoundingClientRect();
            if(!rect||rect.height<=0)return'after';
            const ratio=(ev.clientY-rect.top)/rect.height;
            if(ratio<0.34)return'before';
            if(ratio>0.66)return'after';
            return'replace';
        },
        computeDropInsertIndex(t,i,ev){
            const list=this.getList(t);
            let insertAt=i;
            if(ev&&ev.currentTarget&&typeof ev.clientY==='number'){
                const rect=ev.currentTarget.getBoundingClientRect();
                if(rect&&rect.height>0&&ev.clientY>(rect.top+rect.height/2)){
                    insertAt=i+1;
                }
            }
            return Math.max(0,Math.min(list.length,insertAt));
        },

        setChapterType(type){
            if(!this.currentChapter)return;
            this.currentChapter.type=type;
            if(type==='sidestory'){
                const parentIdx=this.suggestedSideParentIndex();
                if(parentIdx>=0&&parentIdx!==this.selectedChapterIndex){
                    const parent=this.currentArc.chapters[parentIdx];
                    this.currentChapter.sideUnlockAfter=this.ensureChapterId(parent,'cap');
                }else{
                    this.currentChapter.sideUnlockAfter='';
                }
            }else{
                delete this.currentChapter.sideUnlockAfter;
            }
        },

        // ── Battle format ──
        setBattleFormat(fmt){
            if(!this.currentChapter)return;
            this.currentChapter.battleFormat=fmt;
            const max=fmt==='1v1'?1:3;
            while(this.currentChapter.p1.length>max)this.currentChapter.p1.pop();
            while(this.currentChapter.p2.length>max){this.currentChapter.p2.pop();this.currentChapter.p2ai.pop();}
        },

        // ── Utility ──
        stageName(path){
            if(!path)return'';
            const parts=path.replace(/\\/g,'/').split('/');
            const file=parts[parts.length-1]||'';
            const folder=parts.length>2?parts[parts.length-2]:'';
            let name=folder&&folder.toLowerCase()!=='stages'?folder:file.replace(/\.def$/i,'');
            return name.replace(/_/g,' ');
        },
        storyboardDisplayName(path){
            if(!path)return'';
            const parts=path.replace(/\\/g,'/').split('/');
            return parts[parts.length-1].replace(/\.def$/i,'')||path;
        },
        storyboardsBySaga(saga){ return this.storyboardList.filter(s=>s.saga===saga) },
        normalizeText(value){
            return String(value ?? '').trim();
        },
        selectAvailableChar(name){
            this.selectedAvailableCharName = this.normalizeText(name);
            this.sel.chars.clear();
            this.lastClicked.chars = -1;
            this.tick++;
        },
        stopCharPreviewAnimation(){
            if(this.charPreviewPlayer.rafId){
                cancelAnimationFrame(this.charPreviewPlayer.rafId);
            }
            this.charPreviewPlayer.rafId = 0;
            this.charPreviewPlayer.frames = [];
            this.charPreviewPlayer.frameIndex = 0;
            this.charPreviewPlayer.frameElapsed = 0;
            this.charPreviewPlayer.lastTs = 0;
            this.charPreviewPlayer.bounds = null;
        },
        clearCharPreviewCanvas(){
            const canvas = this.$refs.charPreviewCanvas;
            if(!canvas)return;
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(240, Math.round(rect.width || canvas.clientWidth || 256));
            const height = Math.max(180, Math.round(rect.height || canvas.clientHeight || 220));
            const ratio = window.devicePixelRatio || 1;
            if(canvas.width !== Math.round(width * ratio) || canvas.height !== Math.round(height * ratio)){
                canvas.width = Math.round(width * ratio);
                canvas.height = Math.round(height * ratio);
            }
            const ctx = canvas.getContext('2d');
            if(!ctx)return;
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            ctx.clearRect(0, 0, width, height);
        },
        buildCharPreviewBounds(frames){
            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;
            frames.forEach(frame=>{
                const left = frame.offsetX - frame.sprite.axisX;
                const top = frame.offsetY - frame.sprite.axisY;
                minX = Math.min(minX, left);
                minY = Math.min(minY, top);
                maxX = Math.max(maxX, left + frame.sprite.width);
                maxY = Math.max(maxY, top + frame.sprite.height);
            });
            if(!Number.isFinite(minX)){
                return {minX:0,minY:0,maxX:1,maxY:1,width:1,height:1};
            }
            return {
                minX,
                minY,
                maxX,
                maxY,
                width:Math.max(1, maxX - minX),
                height:Math.max(1, maxY - minY)
            };
        },
        renderCharPreviewFrame(){
            const canvas = this.$refs.charPreviewCanvas;
            const frames = this.charPreviewPlayer.frames || [];
            if(!canvas || frames.length===0)return;
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(240, Math.round(rect.width || canvas.clientWidth || 256));
            const height = Math.max(180, Math.round(rect.height || canvas.clientHeight || 220));
            const ratio = window.devicePixelRatio || 1;
            if(canvas.width !== Math.round(width * ratio) || canvas.height !== Math.round(height * ratio)){
                canvas.width = Math.round(width * ratio);
                canvas.height = Math.round(height * ratio);
            }
            const ctx = canvas.getContext('2d');
            if(!ctx)return;
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            ctx.clearRect(0, 0, width, height);

            const frame = frames[this.charPreviewPlayer.frameIndex] || frames[0];
            const bounds = this.charPreviewPlayer.bounds || this.buildCharPreviewBounds(frames);
            const stagePaddingX = 18;
            const stagePaddingTop = 16;
            const stagePaddingBottom = 20;
            const usableWidth = Math.max(1, width - stagePaddingX * 2);
            const usableHeight = Math.max(1, height - stagePaddingTop - stagePaddingBottom);
            const scale = Math.max(1, Math.min(3.4, usableWidth / bounds.width, usableHeight / bounds.height));
            const anchorX = width / 2;
            const anchorY = height - stagePaddingBottom - Math.max(0, bounds.maxY) * scale;

            ctx.fillStyle = 'rgba(14, 19, 28, 0.78)';
            ctx.fillRect(0, height - 34, width, 34);
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.55)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, height - 34);
            ctx.lineTo(width, height - 34);
            ctx.stroke();

            const shadowWidth = Math.max(34, Math.min(110, bounds.width * scale * 0.42));
            ctx.fillStyle = 'rgba(5, 8, 12, 0.38)';
            ctx.beginPath();
            ctx.ellipse(anchorX, height - 18, shadowWidth, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            const drawX = anchorX + (frame.offsetX - frame.sprite.axisX) * scale;
            const drawY = anchorY + (frame.offsetY - frame.sprite.axisY) * scale;
            ctx.save();
            ctx.translate(drawX + (frame.flipH ? frame.sprite.width * scale : 0), drawY + (frame.flipV ? frame.sprite.height * scale : 0));
            ctx.scale(frame.flipH ? -1 : 1, frame.flipV ? -1 : 1);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(frame.sprite.canvas, 0, 0, frame.sprite.width * scale, frame.sprite.height * scale);
            ctx.restore();
        },
        startCharPreviewAnimation(){
            this.stopCharPreviewAnimation();
            if(!this.charPreviewPlayer.frames.length){
                this.clearCharPreviewCanvas();
                return;
            }
            this.charPreviewPlayer.lastTs = 0;
            const step = (ts)=>{
                if(!this.charPreviewPlayer.frames.length)return;
                if(!this.charPreviewPlayer.lastTs){
                    this.charPreviewPlayer.lastTs = ts;
                    this.renderCharPreviewFrame();
                    this.charPreviewPlayer.rafId = requestAnimationFrame(step);
                    return;
                }
                const delta = ts - this.charPreviewPlayer.lastTs;
                this.charPreviewPlayer.lastTs = ts;
                const current = this.charPreviewPlayer.frames[this.charPreviewPlayer.frameIndex];
                const frameMs = current && current.durationMs > 0 ? current.durationMs : (1000 / 60);
                this.charPreviewPlayer.frameElapsed += delta;
                while(this.charPreviewPlayer.frameElapsed >= frameMs){
                    this.charPreviewPlayer.frameElapsed -= frameMs;
                    let nextIndex = this.charPreviewPlayer.frameIndex + 1;
                    if(nextIndex >= this.charPreviewPlayer.frames.length){
                        nextIndex = Math.min(this.charPreviewPlayer.loopStart || 0, this.charPreviewPlayer.frames.length - 1);
                    }
                    this.charPreviewPlayer.frameIndex = nextIndex;
                }
                this.renderCharPreviewFrame();
                this.charPreviewPlayer.rafId = requestAnimationFrame(step);
            };
            this.$nextTick(()=>{
                this.renderCharPreviewFrame();
                this.charPreviewPlayer.rafId = requestAnimationFrame(step);
            });
        },
        async reloadCharPreview(force=false){
            const target = this.charPreviewTarget;
            this.stopCharPreviewAnimation();
            if(!target){
                this.charPreview.loading = false;
                this.charPreview.error = '';
                this.charPreview.status = 'Selecciona un personaje';
                this.charPreview.displayName = '';
                this.charPreview.source = '';
                this.charPreview.imageUrl = '';
                this.charPreview.mugshotUrl = '';
                this.charPreview.frameCount = 0;
                this.charPreview.sffVersion = '';
                this.clearCharPreviewCanvas();
                return;
            }
            const cacheKey = target.name;
            if(force)delete this.charPreviewCache[cacheKey];
            const previewToken = ++this.charPreviewPlayer.token;
            this.charPreview.loading = true;
            this.charPreview.error = '';
            this.charPreview.status = 'Resolviendo archivos del personaje...';
            this.charPreview.displayName = target.label || target.name;
            this.charPreview.source = target.source;
            this.charPreview.imageUrl = '';
            this.charPreview.mugshotUrl = '';
            this.charPreview.frameCount = 0;
            this.charPreview.sffVersion = '';
            this.clearCharPreviewCanvas();

            if(this.charPreviewCache[cacheKey]){
                if(previewToken !== this.charPreviewPlayer.token)return;
                this.applyCharPreviewPayload(target, this.charPreviewCache[cacheKey]);
                return;
            }

            try{
                const query = `/api/chars/preview_idle?char=${encodeURIComponent(target.name)}${target.ref ? `&ref=${encodeURIComponent(target.ref)}` : ''}`;
                const serverResp = await fetch(query, {cache:'no-store'});
                const serverData = await serverResp.json();
                if(serverResp.ok && !serverData.error && serverData.image_url){
                    const payload = {
                        mode:'server',
                        displayName:serverData.display_name || target.label || target.name,
                        source:target.source,
                        status:serverData.status || 'Action 0 · Idle',
                        frameCount:Number(serverData.frame_count) || 0,
                        sffVersion:serverData.sff_version || '',
                        mugshotUrl:serverData.mugshot_url ? `${serverData.mugshot_url}${serverData.mugshot_url.includes('?') ? '&' : '?'}_t=${Date.now()}` : '',
                        imageUrl:`${serverData.image_url}${serverData.image_url.includes('?') ? '&' : '?'}_t=${Date.now()}`
                    };
                    this.charPreviewCache[cacheKey] = payload;
                    if(previewToken !== this.charPreviewPlayer.token)return;
                    this.applyCharPreviewPayload(target, payload);
                    return;
                }

                const manifestQuery = `/api/chars/preview_source?char=${encodeURIComponent(target.name)}${target.ref ? `&ref=${encodeURIComponent(target.ref)}` : ''}`;
                const manifestResp = await fetch(manifestQuery, {cache:'no-store'});
                const manifest = await manifestResp.json();
                if(!manifestResp.ok || manifest.error)throw new Error(manifest.error || 'No se pudo resolver el personaje');
                if(previewToken !== this.charPreviewPlayer.token)return;

                this.charPreview.status = 'Leyendo AIR y SFF...';
                const [airResp, sffResp] = await Promise.all([
                    fetch(encodeURI(manifest.air_path), {cache:'force-cache'}),
                    fetch(encodeURI(manifest.sff_path), {cache:'force-cache'})
                ]);
                if(!airResp.ok)throw new Error(`No se pudo abrir ${manifest.air_path}`);
                if(!sffResp.ok)throw new Error(`No se pudo abrir ${manifest.sff_path}`);
                const [airText, sffBuffer] = await Promise.all([airResp.text(), sffResp.arrayBuffer()]);
                if(previewToken !== this.charPreviewPlayer.token)return;

                this.charPreview.status = 'Renderizando idle...';
                const action = this.parseAirAction(airText, 0);
                const payload = await this.buildCharPreviewPayload(sffBuffer, action);
                payload.displayName = manifest.display_name || target.name;
                payload.source = target.source;
                this.charPreviewCache[cacheKey] = payload;
                if(previewToken !== this.charPreviewPlayer.token)return;
                this.applyCharPreviewPayload(target, payload);
            }catch(err){
                if(previewToken !== this.charPreviewPlayer.token)return;
                this.charPreview.loading = false;
                this.charPreview.error = err && err.message ? err.message : 'No se pudo cargar la preview';
                this.charPreview.status = 'Preview no disponible';
                this.charPreview.imageUrl = '';
                this.charPreview.mugshotUrl = '';
                this.charPreview.frameCount = 0;
                this.charPreview.sffVersion = '';
                this.clearCharPreviewCanvas();
            }
        },
        applyCharPreviewPayload(target, payload){
            this.charPreview.loading = false;
            this.charPreview.error = '';
            this.charPreview.status = payload.status || 'Action 0 · Idle';
            this.charPreview.displayName = payload.displayName || target.name;
            this.charPreview.source = target.source;
            this.charPreview.imageUrl = payload.imageUrl || '';
            this.charPreview.mugshotUrl = payload.mugshotUrl || '';
            this.charPreview.frameCount = Number(payload.frameCount || (payload.frames ? payload.frames.length : 0)) || 0;
            this.charPreview.sffVersion = payload.sffVersion || '';
            if(payload.mode === 'server'){
                this.clearCharPreviewCanvas();
                return;
            }
            this.charPreviewPlayer.frames = payload.frames;
            this.charPreviewPlayer.loopStart = payload.loopStart || 0;
            this.charPreviewPlayer.bounds = payload.bounds || this.buildCharPreviewBounds(payload.frames);
            this.charPreviewPlayer.frameIndex = 0;
            this.charPreviewPlayer.frameElapsed = 0;
            this.startCharPreviewAnimation();
        },
        parseAirAction(airText, actionNo=0){
            const lines = String(airText || '').split(/\r?\n/);
            let active = false;
            let loopStart = 0;
            const frames = [];
            for(const rawLine of lines){
                const line = rawLine.split(';', 1)[0].trim();
                if(!line)continue;
                const actionMatch = line.match(/^\[Begin Action\s+(-?\d+)\]/i);
                if(actionMatch){
                    active = Number(actionMatch[1]) === Number(actionNo);
                    continue;
                }
                if(!active)continue;
                if(line.startsWith('['))break;
                if(/^loopstart$/i.test(line)){
                    loopStart = frames.length;
                    continue;
                }
                if(/^clsn/i.test(line))continue;
                const parts = line.split(',').map(part=>part.trim());
                if(parts.length < 5)continue;
                const group = Number(parts[0]);
                const item = Number(parts[1]);
                const offsetX = Number(parts[2]);
                const offsetY = Number(parts[3]);
                const ticks = Number(parts[4]);
                if(!Number.isFinite(group) || !Number.isFinite(item))continue;
                const flip = String(parts[5] || '').toUpperCase();
                frames.push({
                    group,
                    item,
                    offsetX:Number.isFinite(offsetX) ? offsetX : 0,
                    offsetY:Number.isFinite(offsetY) ? offsetY : 0,
                    ticks:Number.isFinite(ticks) ? ticks : 1,
                    flipH:flip.includes('H'),
                    flipV:flip.includes('V')
                });
            }
            if(!frames.length){
                throw new Error('No se encontró el Begin Action 0 en el AIR');
            }
            return {
                loopStart:Math.min(loopStart, Math.max(0, frames.length - 1)),
                frames
            };
        },
        async buildCharPreviewPayload(sffBuffer, action){
            const bytes = new Uint8Array(sffBuffer);
            const signature = String.fromCharCode(...bytes.slice(0, 11));
            if(signature !== 'ElecbyteSpr'){
                throw new Error('El archivo SFF no tiene una cabecera reconocible');
            }
            const versionTag = bytes[15];
            if(versionTag === 1){
                return await this.buildCharPreviewFromSffV1(sffBuffer, action);
            }
            if(versionTag === 2){
                return await this.buildCharPreviewFromSffV2(sffBuffer, action);
            }
            throw new Error(`Versión de SFF no soportada (${versionTag})`);
        },
        async buildCharPreviewFromSffV1(sffBuffer, action){
            const bytes = new Uint8Array(sffBuffer);
            const view = new DataView(sffBuffer);
            const subheaderOffset = view.getUint32(24, true);
            const headers = [];
            let offset = subheaderOffset;
            let guard = 0;
            while(offset > 0 && offset + 32 <= bytes.length && guard < 20000){
                const nextOffset = view.getUint32(offset, true);
                headers.push({
                    index:headers.length,
                    offset,
                    nextOffset,
                    dataLength:view.getUint32(offset + 4, true),
                    axisX:view.getInt16(offset + 8, true),
                    axisY:view.getInt16(offset + 10, true),
                    group:view.getUint16(offset + 12, true),
                    item:view.getUint16(offset + 14, true),
                    linked:view.getUint16(offset + 16, true),
                    samePalette:bytes[offset + 18] !== 0,
                    dataStart:offset + 32
                });
                if(!nextOffset || nextOffset <= offset)break;
                offset = nextOffset;
                guard += 1;
            }
            const headerMap = new Map();
            headers.forEach(header=>{
                const key = `${header.group}:${header.item}`;
                if(!headerMap.has(key))headerMap.set(key, header.index);
            });
            const spriteCache = new Map();
            const decodeHeader = (index)=>{
                if(spriteCache.has(index))return spriteCache.get(index);
                const header = headers[index];
                if(!header)throw new Error(`Sprite SFF v1 inexistente (${index})`);
                let sprite = null;
                if(header.dataLength === 0 && header.linked > 0 && header.linked < headers.length){
                    const linkedSprite = decodeHeader(header.linked);
                    sprite = {...linkedSprite, axisX:header.axisX, axisY:header.axisY};
                    spriteCache.set(index, sprite);
                    return sprite;
                }
                const raw = bytes.slice(header.dataStart, header.dataStart + header.dataLength);
                const prevSprite = index > 0 ? decodeHeader(index - 1) : null;
                const decoded = this.decodePcxSprite(raw, header.samePalette && prevSprite ? prevSprite._palette : null);
                sprite = {
                    canvas:decoded.canvas,
                    width:decoded.width,
                    height:decoded.height,
                    axisX:header.axisX,
                    axisY:header.axisY,
                    _palette:decoded.palette
                };
                spriteCache.set(index, sprite);
                return sprite;
            };
            const frames = [];
            for(const element of action.frames){
                const headerIndex = headerMap.get(`${element.group}:${element.item}`);
                if(headerIndex == null)continue;
                const sprite = decodeHeader(headerIndex);
                frames.push({
                    sprite,
                    offsetX:element.offsetX,
                    offsetY:element.offsetY,
                    flipH:element.flipH,
                    flipV:element.flipV,
                    durationMs:(element.ticks <= 0 ? 1 : element.ticks) * (1000 / 60)
                });
            }
            if(!frames.length){
                throw new Error('El Action 0 no encontró sprites válidos en el SFF v1');
            }
            return {
                frames,
                loopStart:action.loopStart || 0,
                bounds:this.buildCharPreviewBounds(frames),
                sffVersion:'SFF v1'
            };
        },
        async buildCharPreviewFromSffV2(sffBuffer, action){
            const bytes = new Uint8Array(sffBuffer);
            const view = new DataView(sffBuffer);
            const spriteOffset = view.getUint32(0x24, true);
            const spriteCount = view.getUint32(0x28, true);
            const paletteOffset = view.getUint32(0x2c, true);
            const paletteCount = view.getUint32(0x30, true);
            const ldataOffset = view.getUint32(0x34, true);
            const spriteHeaders = [];
            const paletteHeaders = [];
            for(let i=0;i<paletteCount;i++){
                const off = paletteOffset + i * 16;
                if(off + 16 > bytes.length)break;
                paletteHeaders.push({
                    group:view.getUint16(off, true),
                    item:view.getUint16(off + 2, true),
                    colorCount:view.getUint16(off + 4, true),
                    linked:view.getUint16(off + 6, true),
                    dataOffset:view.getUint32(off + 8, true),
                    dataLength:view.getUint32(off + 12, true)
                });
            }
            for(let i=0;i<spriteCount;i++){
                const off = spriteOffset + i * 28;
                if(off + 28 > bytes.length)break;
                spriteHeaders.push({
                    group:view.getUint16(off, true),
                    item:view.getUint16(off + 2, true),
                    width:view.getUint16(off + 4, true),
                    height:view.getUint16(off + 6, true),
                    axisX:view.getInt16(off + 8, true),
                    axisY:view.getInt16(off + 10, true),
                    linked:view.getUint16(off + 12, true),
                    format:bytes[off + 14],
                    colorDepth:bytes[off + 15],
                    dataOffset:view.getUint32(off + 16, true),
                    dataLength:view.getUint32(off + 20, true),
                    paletteIndex:view.getUint16(off + 24, true),
                    flags:view.getUint16(off + 26, true)
                });
            }
            const spriteMap = new Map();
            spriteHeaders.forEach((header, index)=>{
                const key = `${header.group}:${header.item}`;
                if(!spriteMap.has(key))spriteMap.set(key, index);
            });
            const paletteCache = new Map();
            const spriteCache = new Map();
            const loadPalette = (index)=>{
                if(paletteCache.has(index))return paletteCache.get(index);
                const header = paletteHeaders[index];
                if(!header)return null;
                if(header.linked > 0 && header.linked < paletteHeaders.length){
                    const linkedPalette = loadPalette(header.linked);
                    paletteCache.set(index, linkedPalette);
                    return linkedPalette;
                }
                const abs = ldataOffset + header.dataOffset;
                const paletteBytes = bytes.slice(abs, abs + header.dataLength);
                paletteCache.set(index, paletteBytes);
                return paletteBytes;
            };
            const loadSprite = async (index)=>{
                if(spriteCache.has(index))return spriteCache.get(index);
                const header = spriteHeaders[index];
                if(!header)throw new Error(`Sprite SFF v2 inexistente (${index})`);
                if(header.linked > 0 && header.linked < spriteHeaders.length && header.dataLength === 0){
                    const linkedSprite = await loadSprite(header.linked);
                    const sprite = {...linkedSprite, axisX:header.axisX, axisY:header.axisY};
                    spriteCache.set(index, sprite);
                    return sprite;
                }
                const abs = ldataOffset + header.dataOffset;
                const pngBytes = this.extractPngBytes(bytes, abs);
                let sprite = null;
                if(pngBytes){
                    const decoded = await this.decodePngSprite(pngBytes);
                    sprite = {
                        canvas:decoded.canvas,
                        width:decoded.width,
                        height:decoded.height,
                        axisX:header.axisX,
                        axisY:header.axisY
                    };
                }else if(header.colorDepth === 8){
                    const palette = loadPalette(header.paletteIndex);
                    if(!palette)throw new Error(`Palette ${header.paletteIndex} no disponible para ${header.group},${header.item}`);
                    const pixelCount = header.width * header.height;
                    const pixelBytes = header.format === 2
                        ? this.decodeRle8Pixels(bytes.slice(abs, abs + header.dataLength), pixelCount)
                        : bytes.slice(abs, abs + pixelCount);
                    if(pixelBytes.length < pixelCount){
                        throw new Error(`Sprite ${header.group},${header.item} usa compresión no soportada todavía`);
                    }
                    const canvas = this.buildIndexedSpriteCanvas(header.width, header.height, pixelBytes, palette);
                    sprite = {
                        canvas,
                        width:header.width,
                        height:header.height,
                        axisX:header.axisX,
                        axisY:header.axisY
                    };
                }else if(header.colorDepth === 32){
                    const byteLength = header.width * header.height * 4;
                    const rgbaBytes = bytes.slice(abs, abs + byteLength);
                    if(rgbaBytes.length < byteLength){
                        throw new Error(`Sprite ${header.group},${header.item} usa compresión no soportada todavía`);
                    }
                    const canvas = this.buildRgbaSpriteCanvas(header.width, header.height, rgbaBytes);
                    sprite = {
                        canvas,
                        width:header.width,
                        height:header.height,
                        axisX:header.axisX,
                        axisY:header.axisY
                    };
                }else{
                    throw new Error(`Formato SFF v2 no soportado (${header.format}/${header.colorDepth})`);
                }
                spriteCache.set(index, sprite);
                return sprite;
            };
            const frames = [];
            for(const element of action.frames){
                const spriteIndex = spriteMap.get(`${element.group}:${element.item}`);
                if(spriteIndex == null)continue;
                const sprite = await loadSprite(spriteIndex);
                frames.push({
                    sprite,
                    offsetX:element.offsetX,
                    offsetY:element.offsetY,
                    flipH:element.flipH,
                    flipV:element.flipV,
                    durationMs:(element.ticks <= 0 ? 1 : element.ticks) * (1000 / 60)
                });
            }
            if(!frames.length){
                throw new Error('El Action 0 no encontró sprites válidos en el SFF v2');
            }
            return {
                frames,
                loopStart:action.loopStart || 0,
                bounds:this.buildCharPreviewBounds(frames),
                sffVersion:'SFF v2'
            };
        },
        decodePcxSprite(rawBytes, fallbackPalette=null){
            if(!rawBytes || rawBytes.length < 128){
                throw new Error('PCX inválido o incompleto');
            }
            const view = new DataView(rawBytes.buffer, rawBytes.byteOffset, rawBytes.byteLength);
            const xmin = view.getUint16(4, true);
            const ymin = view.getUint16(6, true);
            const xmax = view.getUint16(8, true);
            const ymax = view.getUint16(10, true);
            const width = (xmax - xmin) + 1;
            const height = (ymax - ymin) + 1;
            const planes = rawBytes[65] || 1;
            const bytesPerLine = view.getUint16(66, true);
            const expected = bytesPerLine * planes * height;
            const paletteMarkerPos = rawBytes.length >= 769 ? rawBytes.length - 769 : -1;
            const dataEnd = paletteMarkerPos >= 0 && rawBytes[paletteMarkerPos] === 0x0c ? paletteMarkerPos : rawBytes.length;
            const decoded = new Uint8Array(expected);
            let src = 128;
            let dst = 0;
            while(src < dataEnd && dst < expected){
                const value = rawBytes[src++];
                if((value & 0xc0) === 0xc0 && src < dataEnd){
                    const count = value & 0x3f;
                    const runValue = rawBytes[src++];
                    decoded.fill(runValue, dst, Math.min(expected, dst + count));
                    dst += count;
                }else{
                    decoded[dst++] = value;
                }
            }
            const pixels = new Uint8Array(width * height);
            for(let y=0;y<height;y++){
                const rowStart = y * bytesPerLine * planes;
                pixels.set(decoded.slice(rowStart, rowStart + width), y * width);
            }
            let palette = fallbackPalette;
            if(paletteMarkerPos >= 0 && rawBytes[paletteMarkerPos] === 0x0c){
                palette = rawBytes.slice(paletteMarkerPos + 1, paletteMarkerPos + 769);
            }
            if(!palette || palette.length < 768){
                throw new Error('El sprite PCX no tiene palette utilizable');
            }
            return {
                width,
                height,
                palette,
                canvas:this.buildIndexedSpriteCanvas(width, height, pixels, palette)
            };
        },
        buildIndexedSpriteCanvas(width, height, pixels, palette){
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            const isRgbaPalette = palette.length % 4 === 0 && palette.length % 3 !== 0;
            for(let i=0;i<pixels.length;i++){
                const colorIndex = pixels[i] || 0;
                const out = i * 4;
                if(colorIndex === 0){
                    imageData.data[out + 3] = 0;
                    continue;
                }
                if(isRgbaPalette){
                    const paletteOffset = colorIndex * 4;
                    imageData.data[out] = palette[paletteOffset] || 0;
                    imageData.data[out + 1] = palette[paletteOffset + 1] || 0;
                    imageData.data[out + 2] = palette[paletteOffset + 2] || 0;
                    imageData.data[out + 3] = palette[paletteOffset + 3] || 255;
                }else{
                    const paletteOffset = colorIndex * 3;
                    imageData.data[out] = palette[paletteOffset] || 0;
                    imageData.data[out + 1] = palette[paletteOffset + 1] || 0;
                    imageData.data[out + 2] = palette[paletteOffset + 2] || 0;
                    imageData.data[out + 3] = 255;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        },
        decodeRle8Pixels(rawBytes, expectedPixels){
            const bytes = rawBytes instanceof Uint8Array ? rawBytes : new Uint8Array(rawBytes || 0);
            if(bytes.length < 4)throw new Error('Sprite RLE8 incompleto');
            const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
            const encodedSize = view.getUint32(0, true);
            const target = Number(expectedPixels || encodedSize) || 0;
            const pixels = [];
            let src = 4;
            while(src < bytes.length && pixels.length < target){
                const value = bytes[src++];
                if(value >= 0x40 && value <= 0x7F && src < bytes.length){
                    const count = value & 0x3F;
                    const runValue = bytes[src++];
                    for(let i=0;i<count && pixels.length < target;i++)pixels.push(runValue);
                }else{
                    pixels.push(value);
                }
            }
            if(pixels.length < target){
                throw new Error('Sprite RLE8 incompleto o corrupto');
            }
            return new Uint8Array(pixels.slice(0, target));
        },
        buildRgbaSpriteCanvas(width, height, rgbaBytes){
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imageData = ctx.createImageData(width, height);
            imageData.data.set(rgbaBytes.slice(0, width * height * 4));
            ctx.putImageData(imageData, 0, 0);
            return canvas;
        },
        readUint32BE(bytes, offset){
            return ((bytes[offset] << 24) >>> 0)
                | (bytes[offset + 1] << 16)
                | (bytes[offset + 2] << 8)
                | bytes[offset + 3];
        },
        extractPngBytes(bytes, offset){
            const pngSig = [0x89, 0x50, 0x4e, 0x47, 0x0d, 0x0a, 0x1a, 0x0a];
            const tryExtract = (start)=>{
                if(start < 0 || start + pngSig.length > bytes.length)return null;
                for(let i=0;i<pngSig.length;i++){
                    if(bytes[start + i] !== pngSig[i])return null;
                }
                let pos = start + 8;
                while(pos + 8 <= bytes.length){
                    const length = this.readUint32BE(bytes, pos);
                    const typeStart = pos + 4;
                    const type = String.fromCharCode(
                        bytes[typeStart],
                        bytes[typeStart + 1],
                        bytes[typeStart + 2],
                        bytes[typeStart + 3]
                    );
                    pos = typeStart + 4 + length + 4;
                    if(pos > bytes.length)return null;
                    if(type === 'IEND'){
                        return bytes.slice(start, pos);
                    }
                }
                return null;
            };
            return tryExtract(offset) || tryExtract(offset + 4);
        },
        async decodePngSprite(pngBytes){
            const blob = new Blob([pngBytes], {type:'image/png'});
            if(window.createImageBitmap){
                const bitmap = await createImageBitmap(blob);
                const canvas = document.createElement('canvas');
                canvas.width = bitmap.width;
                canvas.height = bitmap.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(bitmap, 0, 0);
                if(bitmap.close)bitmap.close();
                return {canvas, width:canvas.width, height:canvas.height};
            }
            const url = URL.createObjectURL(blob);
            try{
                const image = await new Promise((resolve, reject)=>{
                    const el = new Image();
                    el.onload = ()=>resolve(el);
                    el.onerror = ()=>reject(new Error('No se pudo decodificar el PNG del SFF'));
                    el.src = url;
                });
                const canvas = document.createElement('canvas');
                canvas.width = image.width;
                canvas.height = image.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0);
                return {canvas, width:canvas.width, height:canvas.height};
            }finally{
                URL.revokeObjectURL(url);
            }
        },

        // ── Undo/Redo & Auto-Save ──
        handleKeydown(e) {
            if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                this.undo();
            } else if (e.ctrlKey && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                this.redo();
            }
        },
        onStateChange() {
            if (this.isRestoringState || this.dataIsLoading) return;
            if (this.globalSaveTimeout) clearTimeout(this.globalSaveTimeout);
            this.globalSaveTimeout = setTimeout(() => {
                this.pushHistory();
                this.triggerAllSaves();
            }, 1000);
        },
        pushHistory() {
            if (this.historyIndex < this.history.length - 1) {
                this.history = this.history.slice(0, this.historyIndex + 1);
            }
            const snapshot = {
                catalog: JSON.parse(JSON.stringify(this.catalog)),
                charRoster: JSON.parse(JSON.stringify(this.charRoster)),
                stageRoster: JSON.parse(JSON.stringify(this.stageRoster)),
                movelistEditor: this.movelistEditor ? JSON.parse(JSON.stringify(this.movelistEditor)) : null
            };
            this.history.push(snapshot);
            if (this.history.length > 50) this.history.shift();
            else this.historyIndex++;
        },
        undo() {
            if (this.historyIndex > 0) {
                this.historyIndex--;
                this.restoreSnapshot(this.history[this.historyIndex]);
                this.triggerAllSaves();
            }
        },
        redo() {
            if (this.historyIndex < this.history.length - 1) {
                this.historyIndex++;
                this.restoreSnapshot(this.history[this.historyIndex]);
                this.triggerAllSaves();
            }
        },
        restoreSnapshot(snap) {
            this.isRestoringState = true;
            this.catalog = JSON.parse(JSON.stringify(snap.catalog));
            this.charRoster = JSON.parse(JSON.stringify(snap.charRoster));
            this.stageRoster = JSON.parse(JSON.stringify(snap.stageRoster));
            if (snap.movelistEditor) this.movelistEditor = JSON.parse(JSON.stringify(snap.movelistEditor));
            else this.movelistEditor = null;
            this.$nextTick(() => { this.isRestoringState = false; });
        },
        async triggerAllSaves() {
            await this.saveCatalog(true);
            await this.saveChars(true);
            await this.saveStages(true);
            if (this.movelistEditor && this.selectedMovelistChar) await this.saveMovelist(true);
        },

        // ── Setup ──
        async navigatePicker(p){ this.pickerLoading=true;try{let r=await fetch('/api/list_dir?path='+encodeURIComponent(p));let d=await r.json();if(d.current){this.pickerCurrent=d.current;this.pickerParent=d.parent;this.pickerDirs=d.dirs}}catch(e){}this.pickerLoading=false },
        async checkStatus(){ let r=await fetch('/api/status');let d=await r.json();if(d.root){this.projectRoot=d.root;this.loadData()}else this.navigatePicker('~') },
        async submitRoot(){ if(!this.pickerCurrent)return;this.loading=true;this.rootError="";try{let r=await fetch('/api/set_root',{method:'POST',body:JSON.stringify({path:this.pickerCurrent}),headers:{'Content-Type':'application/json'}});let o=await r.json();if(o.success)this.checkStatus();else this.rootError=o.error||"Inválida"}catch(e){this.rootError="Error"}this.loading=false },
        async loadData(){
            this.dataIsLoading = true;
            try{
                let r=await fetch('/api/catalog');let cd=await r.json();
                (cd||[]).forEach(a=>{
                    (a.chapters||[]).forEach(ch=>{
                        if(!ch.p2ai)ch.p2ai=(ch.p2||[]).map(()=>6);
                        if(!ch.introStoryboard)ch.introStoryboard='';
                        if(!ch.dialogues)ch.dialogues=[];
                        if(!ch.round1EndDialogues)ch.round1EndDialogues=[];
                        if(!ch.round2EndDialogues)ch.round2EndDialogues=[];
                        if(!ch.round3EndDialogues)ch.round3EndDialogues=[];
                        if(!ch.healthDialogues)ch.healthDialogues=[];
                        if(!ch.type)ch.type='normal';
                        if(!ch.battleFormat)ch.battleFormat='1v1';
                        this.normalizeChapterRoundTime(ch);
                        this.normalizeChapterSubstitutions(ch);
                    });
                });
                this.catalog=cd||[];
                let r2=await fetch('/api/assets');this.assets=await r2.json();
            }catch(e){}
            
            this.dataIsLoading = false;
            if (this.historyIndex === -1) this.pushHistory();
            else if (!this.isRestoringState) {
                // Update current snapshot with newly loaded data without pushing new undo step
                this.history[this.historyIndex].catalog = JSON.parse(JSON.stringify(this.catalog));
            }
        },
        async saveCatalog(silent=false){
            this.catalog.forEach(arc=>(arc.chapters||[]).forEach(ch=>this.ensureChapterId(ch,'cap')));
            try{
                const payload=this.buildCatalogPayload();
                await fetch('/api/catalog',{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'application/json'}});
                this.catalog.forEach(arc=>(arc.chapters||[]).forEach(ch=>{this.normalizeChapterRoundTime(ch);this.normalizeChapterSubstitutions(ch)}));
                if(!silent) alert('¡Guardado!');
            }catch(e){
                if(!silent) alert('Error');
            }
        },

        addArc(){

            this.selectedArcIndex=this.catalog.length-1;this.selectedChapterIndex=-1;
        },
        addChapter(type='normal'){
            if(!this.currentArc)return;
            if(!this.currentArc.chapters)this.currentArc.chapters=[];
            const first=this.assets.chars[0]||'';
            const chapter={
                id:'cap_'+Date.now(),title:'',subtitle:'',type,
                battleFormat:'1v1',introStoryboard:'',
                p1:[first],p2:[first],p2ai:[6],
                p1Substitutions:3,p2Substitutions:3,
                stage:'random',roundTimeMode:'default',roundTimeValue:99,dialogues:[],
                round1EndDialogues:[],round2EndDialogues:[],round3EndDialogues:[],healthDialogues:[]
            };
            if(type==='sidestory'){
                const parentIdx=this.suggestedSideParentIndex();
                if(parentIdx>=0){
                    const parent=this.currentArc.chapters[parentIdx];
                    chapter.sideUnlockAfter=this.ensureChapterId(parent,'cap');
                }
            }
            this.currentArc.chapters.push(chapter);
            this.selectedChapterIndex=this.currentArc.chapters.length-1;
