<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IKEMEN GO — Editor Integral</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
        body { background: #0a0e14; color: #c8d1dc; margin:0; }
        .top-bar { background: linear-gradient(135deg, #12171f 0%, #161d28 100%); border-bottom: 2px solid #ea580c; }
        .card { background: #131a24; border-radius: 0.5rem; border: 1px solid #1e2a3a; }
        .input-dark { background: #0d1219; border: 1px solid #1e2a3a; color: #e2e8f0; padding: 0.45rem 0.6rem; border-radius: 0.3rem; width: 100%; font-size: 13px; transition: border-color 0.2s; }
        .input-dark:focus { outline: none; border-color: #ea580c; box-shadow: 0 0 0 2px rgba(234,88,12,0.15); }
        .btn-primary { background: linear-gradient(135deg, #ea580c, #dc2626); color: white; padding: 0.45rem 1rem; border-radius: 0.3rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px; border: none; }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-danger { background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5; padding: 0.4rem 1rem; border-radius: 0.3rem; font-weight: 600; cursor: pointer; transition: all 0.15s; font-size: 12px; }
        .btn-danger:hover { background: #991b1b; }
        .btn-secondary { background: #1a2332; border: 1px solid #2a3a4e; color: #c8d1dc; padding: 0.45rem 1rem; border-radius: 0.3rem; cursor: pointer; transition: all 0.15s; font-size: 13px; }
        .btn-secondary:hover { background: #243044; border-color: #3a5068; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #2a3a4e; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        .row-item { transition: background 0.1s; cursor: pointer; user-select: none; }
        .row-item:hover { background: #1a2332 !important; }
        .row-item.selected { background: rgba(139,92,246,0.12) !important; border-color: rgba(139,92,246,0.4) !important; }
        .row-item.drag-over { border-top: 2px solid #ea580c !important; }
        .badge { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
        .badge-green { background: #16a34a22; color: #4ade80; }
        .badge-red { background: #dc262622; color: #f87171; }
        .badge-yellow { background: #ca8a0422; color: #fbbf24; }
        .badge-blue { background: #2563eb22; color: #60a5fa; }
        .badge-purple { background: #7c3aed22; color: #a78bfa; }
        .tab-btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: all 0.15s; cursor: pointer; border: 1px solid transparent; }
        .tab-btn.active { background: rgba(234,88,12,0.15); color: #fb923c; border-color: rgba(234,88,12,0.3); }
        .tab-btn:not(.active) { color: #64748b; }
        .tab-btn:not(.active):hover { color: #94a3b8; background: rgba(255,255,255,0.04); }
        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #475569; margin-bottom: 8px; display:block; }
        .upload-zone { border: 2px dashed #2a3a4e; border-radius: 8px; padding: 16px; text-align: center; transition: all 0.2s; cursor: pointer; }
        .upload-zone:hover, .upload-zone.drag-active { border-color: #ea580c; background: rgba(234,88,12,0.05); }
        select.input-dark { appearance: auto; }
        .panel-header { padding: 10px 14px; background: #0d1219; border-bottom: 1px solid #1e2a3a; }
        .saga-item { transition: all 0.1s; cursor: pointer; user-select: none; }
        .saga-item:hover { background: #1a2332; }
        .saga-item.active { background: rgba(234,88,12,0.08); border-left: 3px solid #ea580c; }
        .chapter-item, .sb-item { transition: all 0.1s; cursor: pointer; user-select: none; }
        .chapter-item:hover, .sb-item:hover { background: #1a2332; }
        .chapter-item.active { background: rgba(96,165,250,0.08); border-left: 3px solid #60a5fa; }
        .sb-item.active { background: rgba(234,88,12,0.08); border-left: 3px solid #ea580c; }
        /* No-select on disk list items */
        .disk-item { cursor: default !important; user-select: none; }

        /* ── Historia Visual ── */
        .scroll-bg {
            background: linear-gradient(180deg, #101722 0%, #0c1119 100%);
            border: 1px solid #1e2a3a;
        }
        .chapter-node {
            width: 92px; flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; transition: transform 0.15s;
            user-select: none;
        }
        .chapter-node:hover { transform: scale(1.08); }
        .chapter-node.active .node-circle { box-shadow: 0 0 0 3px #fff, 0 0 12px rgba(255,200,0,0.8); }
        .chapter-node.drag-over .node-circle { box-shadow: 0 0 0 3px #ea580c, 0 0 18px rgba(234,88,12,0.45); }
        .node-circle {
            width: 56px; height: 56px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 800; border: 3px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: box-shadow 0.15s;
        }
        .node-index {
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .node-label {
            font-size: 10px; font-weight: 700; text-align: center;
            color: #dbe5f1;
            max-width: 86px; line-height: 1.25;
        }
        .node-meta {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7c8aa0;
            margin-bottom: 2px;
        }
        .node-parent {
            font-size: 9px;
            color: #64748b;
        }
        .node-normal { background: radial-gradient(circle at 35% 35%, #fef9d0, #c8a84b); border-color: #8b6914; }
        .node-sidestory { background: radial-gradient(circle at 35% 35%, #d0e8ff, #5b9ed6); border-color: #2563ab; }
        .node-midboss { background: radial-gradient(circle at 35% 35%, #ffd0d0, #d66565); border-color: #991b1b; }
        .node-finalboss { background: radial-gradient(circle at 35% 35%, #f0d0ff, #9b59d6); border-color: #7c2fa8; }
        .node-empty { background: #3d3020; border-color: #5a4a2a; border-style: dashed; opacity: 0.5; }
        .connector { height: 3px; background: linear-gradient(90deg,#334155,#64748b,#334155); flex: 1; min-width: 10px; border-radius: 2px; margin-top: -30px; }
        .format-btn { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
        .format-btn.active { background: rgba(234,88,12,0.2); border-color: #ea580c; color: #fb923c; }
        .format-btn:not(.active) { background: #1a2332; border-color: #2a3a4e; color: #64748b; }
        .format-btn:not(.active):hover { color: #94a3b8; background: #243044; }
    </style>
</head>
<body>
<div id="app" class="flex flex-col h-screen overflow-hidden">

    <!-- ═══ WELCOME MODAL ═══ -->
    <div v-if="!projectRoot" class="fixed inset-0 bg-black/85 flex items-center justify-center z-50">
        <div class="card p-8 max-w-lg w-full shadow-2xl border-orange-600/40 border">
            <h2 class="text-xl font-bold text-orange-500 mb-1">⚡ IKEMEN GO Editor</h2>
            <p class="text-gray-400 mb-5 text-sm">Selecciona la carpeta raíz de tu motor Ikemen GO.</p>
            <div class="space-y-3">
                <div class="flex items-center gap-2">
                    <button @click="navigatePicker(pickerParent)" class="btn-secondary p-2 text-sm">⬅</button>
                    <input v-model="pickerCurrent" type="text" class="input-dark flex-1 text-xs" readonly>
                </div>
                <div class="h-44 overflow-y-auto border border-gray-800 bg-[#0a0e14] rounded p-1 custom-scroll">
                    <div v-if="pickerLoading" class="text-gray-500 text-center py-10 text-sm">Cargando...</div>
                    <div v-else-if="pickerDirs.length===0" class="text-gray-600 text-center py-10 text-sm">Sin subcarpetas</div>
                    <div v-for="d in pickerDirs" :key="d"
                         @click="navigatePicker(pickerCurrent==='/'?d:pickerCurrent+(pickerCurrent.endsWith('/')?'':'/')+d)"
                         class="p-2 hover:bg-gray-800 cursor-pointer flex items-center gap-2 rounded text-sm">📁 {{ d }}</div>
                </div>
                <div v-if="rootError" class="text-red-400 text-xs font-bold bg-red-900/20 p-2 rounded">{{ rootError }}</div>
                <button @click="submitRoot" class="btn-primary w-full py-3" :disabled="loading">{{ loading?'Conectando...':'Vincular Proyecto' }}</button>
            </div>
        </div>
    </div>

    <template v-else>
    <!-- ═══ HEADER ═══ -->
    <header class="top-bar flex justify-between items-center px-5 py-3 flex-shrink-0">
        <div class="flex items-center gap-5">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <span class="text-orange-500">⚡</span><span class="text-white">IKEMEN</span><span class="text-gray-500 font-normal text-sm">Editor</span>
            </h1>
            <nav class="flex gap-1">
                <button @click="activeTab='editor'" :class="{active:activeTab==='editor'}" class="tab-btn">📚 Historia</button>
                <button @click="activeTab='creator';loadStoryboards()" :class="{active:activeTab==='creator'}" class="tab-btn">🎬 Storyboard</button>
                <button @click="activeTab='chars';loadChars()" :class="{active:activeTab==='chars'}" class="tab-btn">🥷 Personajes</button>
                <button @click="activeTab='stages';loadStages()" :class="{active:activeTab==='stages'}" class="tab-btn">🏟️ Stages</button>
            </nav>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 bg-[#0d1219] rounded-lg px-3 py-1.5 border border-[#1e2a3a]">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-sm font-semibold text-gray-200">{{ projectName }}</span>
            </div>
            <button v-if="activeTab==='editor'" @click="saveData" class="btn-primary">💾 Guardar Historia</button>
        </div>
    </header>

    <!-- ═══════════════════════════════════════════════════════════════ -->
    <!-- HISTORIA TAB — Visual node-based editor                       -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div v-show="activeTab==='editor'" class="flex flex-1 overflow-hidden">

        <!-- LEFT: Saga list -->
        <div class="w-52 border-r border-[#1e2a3a] bg-[#0a0e14] flex flex-col overflow-hidden flex-shrink-0">
            <div class="panel-header flex justify-between items-center">
                <span class="font-bold text-sm text-orange-400">📚 Sagas</span>
                <button @click="addArc" class="text-[10px] bg-orange-600/70 px-2 py-0.5 rounded font-bold text-white hover:bg-orange-500">+ Nueva</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll">
                <div v-if="catalog.length===0" class="text-xs text-gray-600 text-center p-6">Sin sagas.</div>
                <div v-for="(arc,aI) in catalog" :key="aI"
                     class="saga-item px-3 py-2.5 border-b border-[#1e2a3a]/50"
                     :class="{active:selectedArcIndex===aI}"
                     @click="selectedArcIndex=aI;selectedChapterIndex=-1">
                    <div class="text-sm font-medium truncate">{{ arc.title||'Sin nombre' }}</div>
                    <div class="text-[10px] text-gray-600">{{ (arc.chapters||[]).length }} caps · {{ arcBossCount(arc) }} jefes</div>
                </div>
            </div>
        </div>

        <!-- CENTER: Visual saga editor (scroll/pergamino) -->
        <div class="flex-1 flex flex-col overflow-hidden bg-[#0c1018]">
            <template v-if="selectedArcIndex>=0 && currentArc">
                <!-- Saga controls bar -->
                <div class="flex items-center gap-3 px-4 py-2 border-b border-[#1e2a3a] bg-[#0d1219] flex-shrink-0">
                    <span class="font-bold text-orange-400">{{ currentArc.title||'Saga' }}</span>
                    <div class="flex gap-1 ml-2">
                        <button @click="addChapter('normal')" class="text-[10px] bg-yellow-700/60 text-yellow-200 px-2 py-0.5 rounded font-bold hover:bg-yellow-700">+ Capítulo</button>
                        <button @click="addChapter('sidestory')" class="text-[10px] bg-blue-700/60 text-blue-200 px-2 py-0.5 rounded font-bold hover:bg-blue-700">+ Side Story</button>
                        <button @click="addChapter('midboss')" class="text-[10px] bg-red-700/60 text-red-200 px-2 py-0.5 rounded font-bold hover:bg-red-700">+ Mid-Boss</button>
                        <button @click="addChapter('finalboss')" class="text-[10px] bg-purple-700/60 text-purple-200 px-2 py-0.5 rounded font-bold hover:bg-purple-700">+ Final Boss</button>
                    </div>
                    <div class="ml-auto flex items-center gap-2 text-[10px] text-gray-500">
                        <span class="w-3 h-3 rounded-full bg-yellow-500/70 inline-block"></span>Cap
                        <span class="w-3 h-3 rounded-full bg-blue-500/70 inline-block ml-2"></span>Side
                        <span class="w-3 h-3 rounded-full bg-red-500/70 inline-block ml-2"></span>Mid-Boss
                        <span class="w-3 h-3 rounded-full bg-purple-500/70 inline-block ml-2"></span>Final-Boss
                    </div>
                </div>

                <!-- Scroll canvas -->
                <div class="flex-1 overflow-auto custom-scroll p-6 flex flex-col gap-4">
                    <div class="scroll-bg rounded-lg p-6 min-h-[200px] relative">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 text-center" style="font-family:'Cinzel',serif;">
                            {{ currentArc.title||'Saga' }}
                        </div>
                        <div class="text-[11px] text-slate-500 text-center mb-5">
                            Arrastra nodos para reordenar. Si arrastras una side story sobre otro nodo, se anida bajo ese capítulo.
                        </div>
                        <div class="flex items-center flex-wrap gap-y-6 gap-x-0 px-2" style="min-height:100px;">
                            <template v-for="(cap,cI) in currentArc.chapters" :key="'n'+cI">
                                <div v-if="cI>0 && cap.type!=='sidestory'" class="connector" style="min-width:18px;max-width:32px;"></div>
                                <div v-if="cI>0 && cap.type==='sidestory'" class="w-4"></div>
                                <div class="chapter-node"
                                     :class="{active:selectedChapterIndex===cI,'drag-over':storyDropIndex===cI}"
                                     draggable="true"
                                     @dragstart="onChapterDragStart(cI,$event)"
                                     @dragover.prevent="onChapterDragOver(cI,$event)"
                                     @dragleave="onChapterDragLeave(cI,$event)"
                                     @drop.prevent="onChapterDrop(cI,$event)"
                                     @dragend="onChapterDragEnd"
                                     @click="selectedChapterIndex=cI">
                                    <div class="node-circle" :class="nodeClass(cap.type)">
                                        <span class="node-index">{{ (currentArcChapterMap[cI] || {}).label || (cI+1) }}</span>
                                    </div>
                                    <div class="node-label">
                                        <div class="node-meta">{{ nodeTypeLabel(cap.type) }}</div>
                                        <div>{{ cap.title||('Cap '+(((currentArcChapterMap[cI] || {}).label) || (cI+1))) }}</div>
                                    </div>
                                    <div v-if="cap.type==='sidestory' && (currentArcChapterMap[cI] || {}).parentLabel" class="node-parent">
                                        ↳ {{ currentArcChapterMap[cI].parentLabel }}
                                    </div>
                                </div>
                            </template>
                            <div v-if="!currentArc.chapters||currentArc.chapters.length===0" class="text-sm text-slate-500 text-center w-full py-4 opacity-70">
                                Usa los botones de arriba para agregar capítulos a esta saga.
                            </div>
                        </div>
                    </div>

                    <!-- Chapter editor appears below the visual when a node is selected -->
                    <div v-if="currentChapter" class="card p-5 space-y-5">
                        <div class="flex items-center justify-between border-b border-[#1e2a3a] pb-2">
                            <h3 class="font-bold text-gray-200 flex items-center gap-2">
                                <span>{{ nodeEmoji(currentChapter.type) }}</span>
                                <span>{{ nodeTypeLabel(currentChapter.type) }} — {{ currentChapter.title||'Sin título' }}</span>
                                <span class="badge" :class="typeBadgeClass(currentChapter.type)">{{ currentChapter.type||'normal' }}</span>
                            </h3>
                            <button @click="deleteCurrentChapter" class="btn-danger text-xs">🗑️ Eliminar Capítulo</button>
                        </div>

                        <!-- Basic info -->
                        <div class="grid grid-cols-3 gap-4">
                            <div><label class="section-title">ID</label><input v-model="currentChapter.id" class="input-dark"></div>
                            <div><label class="section-title">Título</label><input v-model="currentChapter.title" class="input-dark"></div>
                            <div><label class="section-title">Subtítulo / Misión</label><input v-model="currentChapter.subtitle" class="input-dark"></div>
                        </div>

                        <div v-if="currentChapter.type==='sidestory'" class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="section-title">Capítulo Padre</label>
                                <select v-model="currentChapter.sideUnlockAfter" class="input-dark">
                                    <option value="">Automático / anterior</option>
                                    <option v-for="opt in availableSideParents" :key="'parent-'+opt.idx" :value="opt.id">{{ opt.label }}</option>
                                </select>
                            </div>
                            <div class="text-xs text-gray-500 flex items-end pb-2">
                                También puedes arrastrar esta side story sobre otro nodo para reanclarla o anidarla.
                            </div>
                        </div>

                        <!-- Battle format -->
                        <div class="card p-4 space-y-4">
                            <div class="flex justify-between items-start gap-6">
                                <!-- Format selector -->
                                <div class="flex-shrink-0">
                                    <label class="section-title">Formato de Batalla</label>
                                    <div class="flex gap-2 mt-1">
                                        <button @click="setBattleFormat('1v1')" :class="{active:battleFormat==='1v1'}" class="format-btn">⚔️ 1 vs 1</button>
                                        <button @click="setBattleFormat('3v3')" :class="{active:battleFormat==='3v3'}" class="format-btn">👥 3 vs 3</button>
                                        <button @click="setBattleFormat('tag')" :class="{active:battleFormat==='tag'}" class="format-btn">🔄 Tag (cambios)</button>
                                    </div>
                                </div>
                                <!-- Stage + Cutscene -->
                                <div class="flex gap-4 flex-1">
                                    <div class="flex-1"><label class="section-title">Escenario</label>
                                        <select v-model="currentChapter.stage" class="input-dark"><option value="random">Aleatorio</option><option v-for="s in assets.stages" :value="s">{{ stageNameMap[s]||stageName(s) }}</option></select></div>
                                    <div class="flex-1"><label class="section-title">Cinemática Inicial</label>
                                        <select v-model="currentChapter.introStoryboard" class="input-dark"><option value="">Ninguna</option><option v-for="d in assets.storyboard_defs" :value="d">{{ storyboardDisplayName(d) }}</option></select></div>
                                </div>
                            </div>

                            <!-- Teams -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-3 border border-blue-900/30 rounded bg-blue-950/10">
                                    <div class="flex justify-between items-center mb-2">
                                        <h4 class="font-semibold text-blue-400 text-sm">Equipo P1 <span class="text-[10px] text-blue-600">({{ currentChapter.p1.length }}/{{ maxTeamSize }})</span></h4>
                                        <button @click="addP1" v-if="currentChapter.p1.length<maxTeamSize" class="text-[10px] bg-blue-600/60 px-2 py-0.5 rounded text-white">+</button>
                                    </div>
                                    <div v-for="(_,i) in currentChapter.p1" :key="'p1'+i" class="flex gap-2 mb-1.5 items-center">
                                        <select v-model="currentChapter.p1[i]" class="input-dark text-sm flex-1"><option v-for="c in assets.chars" :value="c">{{c}}</option></select>
                                        <button @click="removeP1(i)" v-if="currentChapter.p1.length>1" class="text-red-400 text-xs">✕</button>
                                    </div>
                                </div>
                                <div class="p-3 border border-red-900/30 rounded bg-red-950/10">
                                    <div class="flex justify-between items-center mb-2">
                                        <h4 class="font-semibold text-red-400 text-sm">Equipo P2 / CPU <span class="text-[10px] text-red-600">({{ currentChapter.p2.length }}/{{ maxTeamSize }})</span></h4>
                                        <button @click="addP2" v-if="currentChapter.p2.length<maxTeamSize" class="text-[10px] bg-red-600/60 px-2 py-0.5 rounded text-white">+</button>
                                    </div>
                                    <div v-for="(_,i) in currentChapter.p2" :key="'p2'+i" class="flex gap-2 mb-1.5 items-center">
                                        <select v-model="currentChapter.p2[i]" class="input-dark text-sm flex-1"><option v-for="c in assets.chars" :value="c">{{c}}</option></select>
                                        <div class="flex items-center gap-1"><span class="text-[10px] text-gray-500">IA</span><input type="number" min="1" max="8" v-model.number="currentChapter.p2ai[i]" class="input-dark w-12 text-xs py-0.5"></div>
                                        <button @click="removeP2(i)" v-if="currentChapter.p2.length>1" class="text-red-400 text-xs">✕</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Dialogues -->
                        <div class="card p-4 space-y-3">
                            <div class="flex justify-between items-center border-b border-[#1e2a3a] pb-2">
                                <h3 class="font-semibold text-orange-400 text-sm">💬 Diálogos Pre-Pelea</h3>
                                <button @click="addDialogue" class="text-[10px] bg-gray-700 px-3 py-1 rounded font-bold hover:bg-gray-600">+ Texto</button>
                            </div>
                            <div v-if="!currentChapter.dialogues||currentChapter.dialogues.length===0" class="text-xs text-gray-600 text-center py-3">Sin diálogos. El speaker puede ser cualquier nombre.</div>
                            <div v-for="(dlg,dI) in currentChapter.dialogues" :key="'d'+dI" class="flex gap-2 items-start bg-[#0a0e14] border border-[#1e2a3a] p-2.5 rounded">
                                <span class="text-[10px] text-gray-600 w-5 text-center pt-2">{{dI+1}}</span>
                                <div class="flex flex-col gap-1.5 flex-1">
                                    <input v-model="dlg.speaker" class="input-dark text-xs py-1 w-44" placeholder="Naruto, Kakashi, Narrador…">
                                    <textarea v-model="dlg.text" rows="2" class="input-dark text-xs" placeholder="Texto del diálogo..."></textarea>
                                </div>

createApp({
    data() { return {
        projectRoot:null, pickerCurrent:"~", pickerParent:"~", pickerDirs:[], pickerLoading:false, rootError:"", loading:false,
        catalog:[], assets:{chars:[],stages:[],storyboard_defs:[],storyboard_sffs:[],storyboard_sounds:[]},
        selectedArcIndex:-1, selectedChapterIndex:-1, activeTab:'editor',
        // Storyboard tab
        storyboardList:[], selectedSBPath:'', selectedSB:null,
        sbForm:{name:'',saga:'General',spr:'',snd:'',duration:300},
        sbMsg:'', sbMsgOk:true,
        // Chars/Stages
        charRoster:[], charAvailable:[], charUnused:[], charSearch:'',
        stageRoster:[], stageAvailable:[], stageUnused:[], stageSearch:'', stageNameMap:{},
        sel:{chars:new Set(),stages:new Set()}, lastClicked:{chars:-1,stages:-1}, tick:0,
        editIdx:{chars:-1,stages:-1}, editName:'',
        renameOld:'', renameNew:'', renameDisk:false,
        msg:{chars:'',stages:''}, msgType:{chars:'ok',stages:'ok'},
        dragState:{type:null,idx:null},
        storyDragIndex:-1, storyDropIndex:-1,
        mlGenChar:'', mlGenLoading:false, mlGenResult:'', mlGenError:''
    }},
    computed: {
        currentArc(){ return this.selectedArcIndex>=0?this.catalog[this.selectedArcIndex]:null },
        currentChapter(){ return this.currentArc&&this.currentArc.chapters&&this.selectedChapterIndex>=0&&this.selectedChapterIndex<this.currentArc.chapters.length?this.currentArc.chapters[this.selectedChapterIndex]:null },
        currentArcChapterMap(){ return this.buildChapterVisualMap(this.currentArc) },
        availableSideParents(){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters))return [];
            return this.currentArc.chapters
                .map((chapter,idx)=>({
                    idx,
                    id:chapter&&chapter.id?chapter.id:'',
                    label:`${((this.currentArcChapterMap[idx]||{}).label)||(idx+1)} · ${chapter.title||chapter.id||('Cap '+(idx+1))}`
                }))
                .filter(opt=>opt.idx!==this.selectedChapterIndex&&opt.id);
        },
        battleFormat(){
            if(!this.currentChapter)return '1v1';
            return this.currentChapter.battleFormat||'1v1';
        },
        maxTeamSize(){
            const f=this.battleFormat;
            if(f==='3v3'||f==='tag')return 3;
            return 1;
        },
        projectName(){ if(!this.projectRoot)return''; const p=this.projectRoot.replace(/\\/g,'/').split('/').filter(Boolean); return p[p.length-1]||'Proyecto' },
        filteredCharRoster(){
            const q=this.charSearch.trim().toLowerCase();
            return this.charRoster
                .map((item,idx)=>({item,idx}))
                .filter(row=>{
                    if(!q)return true;
                    const text=this.isLabelEntry(row.item)?(row.item.label||''):(row.item.name||'');
                    return text.toLowerCase().includes(q);
                });
        },
        filteredStageRoster(){ if(!this.stageSearch)return this.stageRoster; const q=this.stageSearch.toLowerCase();return this.stageRoster.filter(s=>(this.stageNameMap[s]||s).toLowerCase().includes(q)) },
        uniqueEnemies(){ if(!this.currentArc||!this.currentArc.chapters)return 0;const s=new Set();this.currentArc.chapters.forEach(ch=>(ch.p2||[]).forEach(p=>s.add(p)));return s.size },
        storyboardSagas(){ const s=new Set();this.storyboardList.forEach(x=>s.add(x.saga));return Array.from(s).sort() },
        sbAssetList(){ const a=[];this.storyboardList.forEach(sb=>{if(sb.spr)a.push(sb.spr);if(sb.snd)a.push(sb.snd)});return[...new Set(a)].sort() }
    },
    methods: {
        // ── Node helpers ──
        lettersForIndex(n){
            let value=Math.max(1, Number(n)||1);
            let out='';
            while(value>0){
                const rem=(value-1)%26;
                out=String.fromCharCode(97+rem)+out;
                value=Math.floor((value-1)/26);
            }
            return out;
        },
        buildChapterVisualMap(arc){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            const idToIdx=new Map();
            const parentOf={};
            const childrenOf={};
            const labels={};
            const mainOrder=[];
            const addChild=(parentIdx,childIdx)=>{
                if(parentIdx==null||parentIdx<0||parentIdx===childIdx)return;
                if(!childrenOf[parentIdx])childrenOf[parentIdx]=[];
                childrenOf[parentIdx].push(childIdx);
                parentOf[childIdx]=parentIdx;
            };

            chapters.forEach((chapter,idx)=>{
                if(chapter&&chapter.id)idToIdx.set(chapter.id,idx);
                if((((chapter || {}).type)||'normal')!=='sidestory'){
                    mainOrder.push(idx);
                    labels[idx]=String(mainOrder.length);
                }
            });

            chapters.forEach((chapter,idx)=>{
                if((((chapter || {}).type)||'normal')!=='sidestory')return;
                let parentIdx=-1;
                if(chapter.sideUnlockAfter&&idToIdx.has(chapter.sideUnlockAfter))parentIdx=idToIdx.get(chapter.sideUnlockAfter);
                if(parentIdx<0){
                    for(let j=idx-1;j>=0;j--){
                        if((((chapters[j] || {}).type)||'normal')!=='sidestory'){
                            parentIdx=j;
                            break;
                        }
                    }
                }
                if(parentIdx>=0)addChild(parentIdx,idx);
            });

            Object.values(childrenOf).forEach(list=>list.sort((a,b)=>a-b));

            const assignChildren=(parentIdx)=>{
                (childrenOf[parentIdx]||[]).forEach((childIdx,order)=>{
                    labels[childIdx]=`${labels[parentIdx]||'1'}${this.lettersForIndex(order+1)}`;
                    assignChildren(childIdx);
                });
            };

            mainOrder.forEach(assignChildren);

            let orphanCount=0;
            chapters.forEach((chapter,idx)=>{
                if(((((chapter || {}).type)||'normal')!=='sidestory')||parentOf[idx]!=null)return;
                orphanCount+=1;
                labels[idx]=`1${this.lettersForIndex(orphanCount)}`;
                assignChildren(idx);
            });

            const map={};
            chapters.forEach((chapter,idx)=>{
                const parentIdx=Number.isInteger(parentOf[idx])?parentOf[idx]:-1;
                map[idx]={
                    label:labels[idx]||String(idx+1),
                    parentIdx,
                    parentLabel:parentIdx>=0?(labels[parentIdx]||String(parentIdx+1)):''
                };
            });
            return map;
        },
        nodeClass(type){
            const m={normal:'node-normal',sidestory:'node-sidestory',midboss:'node-midboss',finalboss:'node-finalboss'};
            return m[type]||'node-normal';
        },
        nodeEmoji(type){
            const m={normal:'📖',sidestory:'🌿',midboss:'💀',finalboss:'👑'};
            return m[type]||'📖';
        },
        nodeTypeLabel(type){
            const m={normal:'Capítulo',sidestory:'Side Story',midboss:'Mid-Boss',finalboss:'Final Boss'};
            return m[type]||'Capítulo';
        },
        typeBadgeClass(type){
            const m={normal:'badge-yellow',sidestory:'badge-blue',midboss:'badge-red',finalboss:'badge-purple'};
            return m[type]||'badge-yellow';
        },
        arcChapterCount(arc,type){ return (arc.chapters||[]).filter(c=>c.type===type).length },
        arcBossCount(arc){ return (arc.chapters||[]).filter(c=>c.type==='midboss'||c.type==='finalboss').length },
        isLabelEntry(item){ return item && item.kind==='label' },
        isCharEntry(item){ return !this.isLabelEntry(item) },
        isSlotLocked(item){ return !!(item && item.slot_locked) },
        makeCharEntry(name='null'){
            return {kind:'char',name,stage:"",hidden:0,order:1,music:"",ai:0,includestage:1,unlock:"",extra_params:[],slot_locked:false};
        },
        makeLabelEntry(label='Nueva etiqueta'){
            return {kind:'label',label,slot_locked:false};
        },
        ensureChapterId(chapter,prefix='cap'){
            if(!chapter)return'';
            if(!chapter.id||!String(chapter.id).trim()){
                chapter.id=`${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
            }
            return chapter.id;
        },
        chapterParentIndex(arc,idx,map){
            const view=map||this.buildChapterVisualMap(arc);
            return view[idx]?view[idx].parentIdx:-1;
        },
        isChapterDescendant(arc,candidateIdx,ancestorIdx,map){
            const chapters=arc&&Array.isArray(arc.chapters)?arc.chapters:[];
            let cursor=candidateIdx;
            let guard=0;
            while(cursor>=0&&guard<=chapters.length){
                if(cursor===ancestorIdx)return true;
                cursor=this.chapterParentIndex(arc,cursor,map);
                guard+=1;
            }
            return false;
        },
        suggestedSideParentIndex(){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters)||this.currentArc.chapters.length===0)return-1;
            if(this.selectedChapterIndex>=0&&this.selectedChapterIndex<this.currentArc.chapters.length)return this.selectedChapterIndex;
            return this.currentArc.chapters.length-1;
        },
        normalizeRosterItem(item){
            if(this.isLabelEntry(item))return {...this.makeLabelEntry(item.label||'Nueva etiqueta'),...item,kind:'label'};
            const base=this.makeCharEntry(item&&item.name?item.name:'null');
            const extraParams=Array.isArray(item&&item.extra_params)?item.extra_params:[];
            return {...base,...item,kind:'char',extra_params:[...extraParams],slot_locked:!!(item&&item.slot_locked)};
        },
        ensureRosterEditable(idx,action){
            const item=this.charRoster[idx];
            if(this.isSlotLocked(item)){
                this.showMsg('chars',`Slot fijo: no se puede ${action}`,'err');
                return false;
            }
            return true;
        },
        selectedCharsAllLocked(){
            if(this.sel.chars.size===0)return false;
            return Array.from(this.sel.chars).every(i=>this.isSlotLocked(this.charRoster[i]));
        },
        bulkToggleSlotLock(){
            if(this.sel.chars.size===0)return;
            this.bulkAction('chars', this.selectedCharsAllLocked() ? 'slotunlock' : 'slotlock');
        },

        // ── Battle format ──
        setBattleFormat(fmt){
            if(!this.currentChapter)return;
            this.currentChapter.battleFormat=fmt;
            const max=fmt==='1v1'?1:3;
            while(this.currentChapter.p1.length>max)this.currentChapter.p1.pop();
            while(this.currentChapter.p2.length>max){this.currentChapter.p2.pop();this.currentChapter.p2ai.pop();}
        },

        // ── Utility ──
        stageName(path){
            if(!path)return'';
            const parts=path.replace(/\\/g,'/').split('/');
            const file=parts[parts.length-1]||'';
            const folder=parts.length>2?parts[parts.length-2]:'';
            let name=folder&&folder.toLowerCase()!=='stages'?folder:file.replace(/\.def$/i,'');
            return name.replace(/_/g,' ');
        },
        storyboardDisplayName(path){
            if(!path)return'';
            const parts=path.replace(/\\/g,'/').split('/');
            return parts[parts.length-1].replace(/\.def$/i,'')||path;
        },
        storyboardsBySaga(saga){ return this.storyboardList.filter(s=>s.saga===saga) },

        // ── Setup ──
        async navigatePicker(p){ this.pickerLoading=true;try{let r=await fetch('/api/list_dir?path='+encodeURIComponent(p));let d=await r.json();if(d.current){this.pickerCurrent=d.current;this.pickerParent=d.parent;this.pickerDirs=d.dirs}}catch(e){}this.pickerLoading=false },
        async checkStatus(){ let r=await fetch('/api/status');let d=await r.json();if(d.root){this.projectRoot=d.root;this.loadData()}else this.navigatePicker('~') },
        async submitRoot(){ if(!this.pickerCurrent)return;this.loading=true;this.rootError="";try{let r=await fetch('/api/set_root',{method:'POST',body:JSON.stringify({path:this.pickerCurrent}),headers:{'Content-Type':'application/json'}});let o=await r.json();if(o.success)this.checkStatus();else this.rootError=o.error||"Inválida"}catch(e){this.rootError="Error"}this.loading=false },
        async loadData(){
            try{
                let r=await fetch('/api/catalog');let cd=await r.json();
                (cd||[]).forEach(a=>{
                    (a.chapters||[]).forEach(ch=>{
                        if(!ch.p2ai)ch.p2ai=(ch.p2||[]).map(()=>6);
                        if(!ch.introStoryboard)ch.introStoryboard='';
                        if(!ch.dialogues)ch.dialogues=[];
                        if(!ch.type)ch.type='normal';
                        if(!ch.battleFormat)ch.battleFormat='1v1';
                    });
                });
                this.catalog=cd||[];
                let r2=await fetch('/api/assets');this.assets=await r2.json();
            }catch(e){}
        },
        async saveData(){
            this.catalog.forEach(arc=>(arc.chapters||[]).forEach(ch=>this.ensureChapterId(ch,'cap')));
            try{await fetch('/api/catalog',{method:'POST',body:JSON.stringify(this.catalog),headers:{'Content-Type':'application/json'}});alert('¡Guardado!')}catch(e){alert('Error')}
        },

        // ── Arc/Chapter ──
        addArc(){
            this.catalog.push({id:'saga_'+Date.now(),title:'Nueva Saga',subtitle:'',chapters:[]});
            this.selectedArcIndex=this.catalog.length-1;this.selectedChapterIndex=-1;
        },
        addChapter(type='normal'){
            if(!this.currentArc)return;
            if(!this.currentArc.chapters)this.currentArc.chapters=[];
            const first=this.assets.chars[0]||'';
            const chapter={
                id:'cap_'+Date.now(),title:'',subtitle:'',type,
                battleFormat:'1v1',introStoryboard:'',
                p1:[first],p2:[first],p2ai:[6],
                stage:'random',dialogues:[]
            };
            if(type==='sidestory'){
                const parentIdx=this.suggestedSideParentIndex();
                if(parentIdx>=0){
                    const parent=this.currentArc.chapters[parentIdx];
                    chapter.sideUnlockAfter=this.ensureChapterId(parent,'cap');
                }
            }
            this.currentArc.chapters.push(chapter);
            this.selectedChapterIndex=this.currentArc.chapters.length-1;
        },
        deleteCurrentChapter(){
            if(!this.currentArc||this.selectedChapterIndex<0)return;
            if(!confirm('¿Eliminar este capítulo?'))return;
            this.currentArc.chapters.splice(this.selectedChapterIndex,1);
            this.selectedChapterIndex=Math.min(this.selectedChapterIndex,this.currentArc.chapters.length-1);
            if(this.currentArc.chapters.length===0)this.selectedChapterIndex=-1;
        },
        deleteCurrentArc(){
            if(this.selectedArcIndex<0)return;
            if(!confirm('¿Eliminar "'+this.currentArc.title+'"?'))return;
            this.catalog.splice(this.selectedArcIndex,1);
            this.selectedArcIndex=this.catalog.length>0?0:-1;
            this.selectedChapterIndex=-1;
        },
        addDialogue(){ if(!this.currentChapter.dialogues)this.currentChapter.dialogues=[];this.currentChapter.dialogues.push({speaker:'',text:''}) },
        addP1(){ const m=this.maxTeamSize;if(this.currentChapter.p1.length<m)this.currentChapter.p1.push(this.assets.chars[0]||'') },
        removeP1(i){ this.currentChapter.p1.splice(i,1) },
        addP2(){ const m=this.maxTeamSize;if(this.currentChapter.p2.length<m){this.currentChapter.p2.push(this.assets.chars[0]||'');this.currentChapter.p2ai.push(6)} },
        removeP2(i){ this.currentChapter.p2.splice(i,1);this.currentChapter.p2ai.splice(i,1) },

        // ── Storyboard ──
        async loadStoryboards(){ try{let r=await fetch('/api/storyboards');let d=await r.json();if(!d.error)this.storyboardList=d.storyboards||[]}catch(e){} },
        newStoryboard(){ this.selectedSBPath='__new__';this.selectedSB={name:'',isNew:true};this.sbForm={name:'',saga:'General',spr:'',snd:'',duration:300} },
        selectStoryboard(sb){ this.selectedSBPath=sb.path;this.selectedSB={...sb,isNew:false};this.sbForm={name:sb.name,saga:sb.saga,spr:sb.spr,snd:sb.snd,duration:sb.duration} },
        async saveStoryboard(){
            if(!this.sbForm.name){this.sbMsg='Nombre requerido';this.sbMsgOk=false;return}
            try{
                let r=await fetch('/api/create_storyboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.sbForm)});
                let d=await r.json();
                if(d.success){this.sbMsg='Guardado ✓';this.sbMsgOk=true;await this.loadStoryboards();await this.loadData();setTimeout(()=>this.sbMsg='',3000)}
                else{this.sbMsg=d.error||'Error';this.sbMsgOk=false}
            }catch(e){this.sbMsg='Error';this.sbMsgOk=false}
        },
        async uploadSBAsset(ev,type){
            const file=ev.target.files[0];if(!file)return;
            const fd=new FormData();fd.append('file',file);fd.append('type','storyboard_asset');fd.append('saga',this.sbForm.saga||'General');
            try{
                let r=await fetch('/api/upload',{method:'POST',body:fd});let d=await r.json();
                if(d.success){if(type==='sff')this.sbForm.spr=d.path;else this.sbForm.snd=d.path;this.sbMsg=file.name+' subido';this.sbMsgOk=true;setTimeout(()=>this.sbMsg='',3000)}
                else{this.sbMsg=d.error;this.sbMsgOk=false}
            }catch(e){this.sbMsg='Error upload';this.sbMsgOk=false}
            ev.target.value='';
        },

        // ── Shared roster ──
        getList(t){ return t==='chars'?this.charRoster:this.stageRoster },
        isSel(t,i){ void this.tick;return this.sel[t].has(i) },
        toggleSel(t,i){ this.sel[t].has(i)?this.sel[t].delete(i):this.sel[t].add(i);this.lastClicked[t]=i;this.tick++ },
        clearSel(t){ this.sel[t].clear();this.tick++ },
        toggleAll(t,ev){
            const l=t==='chars'?this.filteredCharRoster:this.filteredStageRoster;
            if(ev.target.checked){
                l.forEach((row,i)=>this.sel[t].add(t==='chars'?row.idx:i));
            }else this.sel[t].clear();
            this.tick++;
        },
        handleRowClick(t,i,ev){
            if(['INPUT','SELECT','BUTTON','TEXTAREA'].includes(ev.target.tagName))return;
            if(ev.ctrlKey||ev.metaKey){this.toggleSel(t,i);return}
            if(ev.shiftKey&&this.lastClicked[t]>=0){const a=Math.min(this.lastClicked[t],i),b=Math.max(this.lastClicked[t],i);for(let x=a;x<=b;x++)this.sel[t].add(x);this.tick++;return}
            this.sel[t].clear();this.sel[t].add(i);this.lastClicked[t]=i;this.tick++
        },
        moveItem(t,i,d){
            const l=this.getList(t),n=i+d;
            if(n<0||n>=l.length)return;
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'mover'))return;
                if(this.isSlotLocked(l[n]))return this.showMsg('chars','No puedes mover sobre un slot fijo','err');
            }
            const it=l.splice(i,1)[0];
            l.splice(n,0,it);
        },
        dupItem(t,i){
            const l=this.getList(t);
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'duplicar'))return;
                const copy=this.normalizeRosterItem(JSON.parse(JSON.stringify(l[i])));
                copy.slot_locked=false;
                l.splice(i+1,0,copy);
            }else l.splice(i+1,0,l[i]);
            this.showMsg(t,'Duplicado','ok');
        },
        removeItem(t,i){
            const l=this.getList(t);
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'quitar'))return;
                const ch=l[i];
                if(this.isCharEntry(ch)&&ch.name!=='null'&&ch.name!=='randomselect')this.charUnused.push({name:ch.name,type:'folder'});
            }
            l.splice(i,1);
        },
        bulkAction(t,a){
            const idx=Array.from(this.sel[t]).sort((a,b)=>b-a);
            if(a==='delete'){
                if(t==='chars'&&idx.some(i=>this.isSlotLocked(this.charRoster[i])))return this.showMsg('chars','Libera primero los slots fijos','err');
                if(!confirm(`¿Quitar ${idx.length} items?`))return;
                const l=this.getList(t);
                idx.forEach(i=>{
                    if(t==='chars'){
                        const ch=l[i];
                        if(ch&&this.isCharEntry(ch)&&ch.name!=='null'&&ch.name!=='randomselect')this.charUnused.push({name:ch.name,type:'folder'});
                    }
                    l.splice(i,1);
                });
                this.showMsg(t,idx.length+' removidos','ok');
            }
            else if(a==='slotlock'){ idx.forEach(i=>{if(this.charRoster[i])this.charRoster[i].slot_locked=true}); this.showMsg(t,'Slots fijados','ok') }
            else if(a==='slotunlock'){ idx.forEach(i=>{if(this.charRoster[i])this.charRoster[i].slot_locked=false}); this.showMsg(t,'Slots liberados','ok') }
            this.clearSel(t)
        },
        toggleEngineLock(i){
            if(!this.ensureRosterEditable(i,'cambiar el estado'))return;
            const c=this.charRoster[i];
            if(!this.isCharEntry(c))return;
            if(c.hidden>0){c.hidden=0;c.unlock=''}else c.hidden=2;
        },
        toggleSlotLock(i){
            const item=this.charRoster[i];
            if(!item)return;
            item.slot_locked=!item.slot_locked;
            this.showMsg('chars',item.slot_locked?'Slot fijado':'Slot liberado','ok');
        },
        startEdit(t,i){
            if(t==='chars'&&!this.ensureRosterEditable(i,'editar'))return;
            this.editIdx[t]=i;
            this.editName=this.isLabelEntry(this.charRoster[i])?this.charRoster[i].label:this.charRoster[i].name;
        },
        finishEdit(t,i){
            const item=this.charRoster[i],n=this.editName.trim();
            this.editIdx[t]=-1;
            if(!item||!n)return;
            if(this.isLabelEntry(item)){
                if(n===item.label)return;
                item.label=n;
                return this.showMsg('chars','Etiqueta actualizada','ok');
            }
            const o=item.name;
            if(n===o)return;
            this.charRoster.forEach(c=>{if(this.isCharEntry(c)&&c.name===o)c.name=n});
            this.showMsg(t,`${o} → ${n}`,'ok');
        },
        addToRoster(t,name){
            if(t==='chars'){this.charRoster.push(this.makeCharEntry(name));this.charUnused=this.charUnused.filter(u=>u.name!==name)}
            else{this.stageRoster.push(name);this.stageUnused=this.stageUnused.filter(u=>u.name!==name)}
            this.showMsg(t,'Agregado','ok')
        },
        addNull(){ this.charRoster.push(this.makeCharEntry('null')) },
        addRandom(){ this.charRoster.push(this.makeCharEntry('randomselect')) },
        addLabel(){
            this.charRoster.push(this.makeLabelEntry());
            this.editIdx.chars=this.charRoster.length-1;
            this.editName='Nueva etiqueta';
        },
        insertLabelAfter(i){
            if(!this.ensureRosterEditable(i,'insertar una etiqueta'))return;
            this.charRoster.splice(i+1,0,this.makeLabelEntry());
            this.editIdx.chars=i+1;
            this.editName='Nueva etiqueta';
        },
        fillRow(){
            const slots=this.charRoster.filter(item=>this.isCharEntry(item)).length;
            const r=slots%21;
            if(r===0)return this.showMsg('chars','Ya alineado','ok');
            const n=21-r;
            for(let i=0;i<n;i++)this.charRoster.push(this.makeCharEntry('null'));
            this.showMsg('chars',n+' nulls','ok');
        },

        async loadChars(){
            try{
                let r=await fetch('/api/chars');
                let d=await r.json();
                if(d.error)return this.showMsg('chars',d.error,'err');
                this.charRoster=(d.roster||[]).map(item=>this.normalizeRosterItem(item));
                this.charAvailable=d.available||[];
                this.charUnused=d.unused||[];
            }catch(e){this.showMsg('chars','Error','err')}
        },
        async saveChars(){ try{let r=await fetch('/api/chars/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roster:this.charRoster})});let d=await r.json();if(d.success){this.showMsg('chars','Guardado ✓','ok');this.loadChars();this.loadData()}else this.showMsg('chars',d.error,'err')}catch(e){this.showMsg('chars','Error','err')} },
        async loadStages(){ try{let r=await fetch('/api/stages');let d=await r.json();if(d.error)return this.showMsg('stages',d.error,'err');this.stageRoster=d.roster||[];this.stageAvailable=d.available||[];this.stageUnused=d.unused||[];this.stageNameMap=d.name_map||{}}catch(e){this.showMsg('stages','Error','err')} },
        async saveStages(){ try{let r=await fetch('/api/stages/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stages:this.stageRoster})});let d=await r.json();if(d.success){this.showMsg('stages','Guardado ✓','ok');this.loadData()}else this.showMsg('stages',d.error,'err')}catch(e){this.showMsg('stages','Error','err')} },
        async renameChar(){ if(!this.renameOld||!this.renameNew)return;try{let r=await fetch('/api/chars/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:this.renameOld,new_name:this.renameNew,rename_disk:this.renameDisk})});let d=await r.json();if(d.success){this.showMsg('chars',`${this.renameOld} → ${this.renameNew}`,'ok');this.renameOld='';this.renameNew='';this.loadChars()}else this.showMsg('chars',d.error,'err')}catch(e){this.showMsg('chars','Error','err')} },
        async handleFileSelect(t,ev){ const f=ev.target.files[0];if(f)await this.uploadZip(t,f);ev.target.value='' },
        async handleFileDrop(t,ev){ ev.currentTarget.classList.remove('drag-active');const f=ev.dataTransfer.files[0];if(f&&f.name.endsWith('.zip'))await this.uploadZip(t,f);else this.showMsg(t,'Solo .zip','err') },
        async uploadZip(t,file){
            this.showMsg(t,'Subiendo…','ok');
            const fd=new FormData();fd.append('zipfile',file);fd.append('type',t);
            try{let r=await fetch('/api/upload',{method:'POST',body:fd});let d=await r.json();
                if(d.success){this.showMsg(t,`${d.name} instalado`,'ok');if(t==='chars')this.loadChars();else this.loadStages()}
                else this.showMsg(t,d.error,'err')
            }catch(e){this.showMsg(t,'Error','err')}
        },
        onChapterDragStart(i,ev){
            if(!this.currentArc||!this.currentArc.chapters||!this.currentArc.chapters[i])return;
            this.storyDragIndex=i;
            this.storyDropIndex=i;
            ev.dataTransfer.effectAllowed='move';
        },
        onChapterDragOver(i){
            this.storyDropIndex=i;
        },
        onChapterDragLeave(i){
            if(this.storyDropIndex===i)this.storyDropIndex=-1;
        },
        onChapterDrop(i){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters))return this.onChapterDragEnd();
            const from=this.storyDragIndex;
            if(from<0||from===i)return this.onChapterDragEnd();
            const chapters=this.currentArc.chapters;
            const selected=this.currentChapter;
            const map=this.buildChapterVisualMap(this.currentArc);
            const target=chapters[i];
            if(!target||!chapters[from])return this.onChapterDragEnd();

            if((chapters[from].type||'normal')==='sidestory'&&this.isChapterDescendant(this.currentArc,i,from,map)){
                this.onChapterDragEnd();
                alert('No puedes anidar una side story dentro de una de sus propias ramas.');
                return;
            }

            this.ensureChapterId(target,'cap');
            const [item]=chapters.splice(from,1);
            if((item.type||'normal')==='sidestory'){
                item.sideUnlockAfter=target.id;
            }else{
                delete item.sideUnlockAfter;
            }

            const insertAt=Math.min(chapters.length, from<i ? i : i+1);
            chapters.splice(insertAt,0,item);
            this.selectedChapterIndex=selected?chapters.indexOf(selected):chapters.indexOf(item);
            this.onChapterDragEnd();
        },
        onChapterDragEnd(){
            this.storyDragIndex=-1;
            this.storyDropIndex=-1;
        },
        onDragStart(t,i,ev){
            if(t==='chars'&&this.isSlotLocked(this.charRoster[i])){
                ev.preventDefault();
                return;
            }
            this.dragState={type:t,idx:i};
            ev.dataTransfer.effectAllowed='move';
        },
        onDragOver(ev){ ev.currentTarget.classList.add('drag-over') },
        onDragLeave(ev){ ev.currentTarget.classList.remove('drag-over') },
        onDrop(t,i,ev){
            ev.currentTarget.classList.remove('drag-over');
            if(!this.dragState.type||this.dragState.type!==t||this.dragState.idx===i)return;
            const l=this.getList(t);
            if(t==='chars'&&(this.isSlotLocked(l[i])||this.isSlotLocked(l[this.dragState.idx]))){
                this.dragState={type:null,idx:null};
                return this.showMsg('chars','No puedes mover slots fijos','err');
            }
            const it=l.splice(this.dragState.idx,1)[0];
            l.splice(i,0,it);
            this.dragState={type:null,idx:null};
        },
        async generateMovelist(){
            this.mlGenLoading=true;this.mlGenResult='';this.mlGenError='';
            try{
                let r=await fetch('/api/movelist/generate?char='+encodeURIComponent(this.mlGenChar));
                let d=await r.json();
                if(d.success){
                    let total=0;(d.movelist.sections||[]).forEach(s=>total+=s.moves.length);
                    this.mlGenResult=total+' movimientos generados ✓ → moves/'+this.mlGenChar+'/movelist.json';
                }else this.mlGenError=d.error||'Error';
            }catch(e){this.mlGenError='Error de conexión'}
            this.mlGenLoading=false;
        },
        showMsg(t,m,tp){ this.msg[t]=m;this.msgType[t]=tp;setTimeout(()=>this.msg[t]='',4000) }
    },
    mounted(){ this.checkStatus() }
}).mount('#app');
</script>
</body>
</html>
