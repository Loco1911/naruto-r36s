            this.currentArc.chapters.splice(this.selectedChapterIndex,1);
            this.selectedChapterIndex=Math.min(this.selectedChapterIndex,this.currentArc.chapters.length-1);
            if(this.currentArc.chapters.length===0)this.selectedChapterIndex=-1;
        },
        deleteCurrentArc(){
            if(this.selectedArcIndex<0)return;
            if(!confirm('¿Eliminar "'+this.currentArc.title+'"?'))return;

        addDialogue(){ if(!this.currentChapter.dialogues)this.currentChapter.dialogues=[];this.currentChapter.dialogues.push({speaker:'',text:''}) },

        addRound2Dialog(){ if(!this.currentChapter.round2EndDialogues)this.currentChapter.round2EndDialogues=[];this.currentChapter.round2EndDialogues.push({speaker:'',text:''}) },
        addRound3Dialog(){ if(!this.currentChapter.round3EndDialogues)this.currentChapter.round3EndDialogues=[];this.currentChapter.round3EndDialogues.push({speaker:'',text:''}) },
        addHealthDialog(){ if(!this.currentChapter.healthDialogues)this.currentChapter.healthDialogues=[];this.currentChapter.healthDialogues.push({speaker:'',text:'',target:'p2',thresholdPercent:50}) },
        addP1(){ const m=this.maxTeamSize;if(this.currentChapter.p1.length<m)this.currentChapter.p1.push(this.assets.chars[0]||'') },
        removeP1(i){ this.currentChapter.p1.splice(i,1) },
        addP2(){ const m=this.maxTeamSize;if(this.currentChapter.p2.length<m){this.currentChapter.p2.push(this.assets.chars[0]||'');this.currentChapter.p2ai.push(6)} },
        removeP2(i){ this.currentChapter.p2.splice(i,1);this.currentChapter.p2ai.splice(i,1) },

        // ── Storyboard ──
        async loadStoryboards(){ try{let r=await fetch('/api/storyboards');let d=await r.json();if(!d.error)this.storyboardList=d.storyboards||[]}catch(e){} },
        newStoryboard(){ this.selectedSBPath='__new__';this.selectedSB={name:'',isNew:true};this.sbForm={name:'',saga:'General',spr:'',snd:'',duration:300} },
        async uploadStoryboardVideo(e){

            fd.append('saga',saga);

        // ── Shared roster ──
        getList(t){ return t==='chars'?this.charRoster:this.stageRoster },
        isSel(t,i){ void this.tick;return this.sel[t].has(i) },
        toggleSel(t,i){ this.sel[t].has(i)?this.sel[t].delete(i):this.sel[t].add(i);this.lastClicked[t]=i;this.tick++ },
        clearSel(t){ this.sel[t].clear();this.tick++ },
        toggleAll(t,ev){
            const l=t==='chars'?this.filteredCharRoster:this.filteredStageRoster;
            if(ev.target.checked){
                l.forEach((row,i)=>this.sel[t].add(t==='chars'?row.idx:i));
            }else this.sel[t].clear();
            this.tick++;
        },
        handleRowClick(t,i,ev){
            if(['INPUT','SELECT','BUTTON','TEXTAREA'].includes(ev.target.tagName))return;
            if(t==='chars')this.selectedAvailableCharName='';
            if(ev.ctrlKey||ev.metaKey){this.toggleSel(t,i);return}
            if(ev.shiftKey&&this.lastClicked[t]>=0){const a=Math.min(this.lastClicked[t],i),b=Math.max(this.lastClicked[t],i);for(let x=a;x<=b;x++)this.sel[t].add(x);this.tick++;return}
            this.sel[t].clear();this.sel[t].add(i);this.lastClicked[t]=i;this.tick++
        },
        moveItem(t,i,d){
            const l=this.getList(t),n=i+d;
            if(n<0||n>=l.length)return;
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'mover'))return;
                if(this.isSlotLocked(l[n]))return this.showMsg('chars','No puedes mover sobre un slot fijo','err');
            }
            const it=l.splice(i,1)[0];
            l.splice(n,0,it);
        },
        dupItem(t,i){
            const l=this.getList(t);
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'duplicar'))return;
                const copy=this.normalizeRosterItem(JSON.parse(JSON.stringify(l[i])));
                copy.slot_locked=false;
                l.splice(i+1,0,copy);
            }else l.splice(i+1,0,l[i]);
            this.showMsg(t,'Duplicado','ok');
        },
        removeItem(t,i){
            const l=this.getList(t);
            if(t==='chars'){
                if(!this.ensureRosterEditable(i,'quitar'))return;
                l.splice(i,1);
                this.syncCharUnusedFromRoster();
                return;
            }
            l.splice(i,1);
        },
        selectedCharNames(){
            const names=[];
            const seen=new Set();
            Array.from(this.sel.chars).sort((a,b)=>a-b).forEach(idx=>{
                const entry=this.charRoster[idx];
                if(!this.isCharEntry(entry))return;
                const name=this.rosterCharRef(entry);
                if(!name||name==='null'||name==='randomselect'||seen.has(name))return;
                seen.add(name);
                names.push(name);
            });
            return names;
        },
        selectedCharDeleteTargets(){
            const targets=[];
            const seen=new Set();
            Array.from(this.sel.chars).sort((a,b)=>a-b).forEach(idx=>{
                const entry=this.charRoster[idx];
                if(!this.isCharEntry(entry))return;
                const name=this.rosterCharRef(entry);
                const key=this.normalizeText(name).toLowerCase();
                if(!name||name==='null'||name==='randomselect'||seen.has(key))return;
                seen.add(key);
                targets.push({name,label:this.charDeleteLabel(name,entry.name)});
            });
            return targets;
        },
        selectedStageNames(){
            const names=[];
            const seen=new Set();
            Array.from(this.sel.stages).sort((a,b)=>a-b).forEach(idx=>{
                const stage=(this.stageRoster[idx]||'').trim();
                if(!stage||seen.has(stage))return;
                seen.add(stage);
                names.push(stage);
            });
            return names;
        },
        charDeleteLabel(charRef,displayName=''){
            const ref=this.normalizeText(charRef);
            const label=this.normalizeText(displayName);
            if(label&&ref&&label.toLowerCase()!==ref.toLowerCase())return `${label} [${ref}]`;
            return label||ref;
        },
        async deleteCharsEverywhere(rawNames, rawLabels=[]){
            const seen=new Set();
            const names=[];
            const labels={};
            (rawNames||[]).forEach((rawName,idx)=>{
                const name=this.normalizeText(rawName);
                const key=name.toLowerCase();
                if(!name||name==='null'||name==='randomselect'||seen.has(key))return;
                seen.add(key);
                names.push(name);
                labels[name]=this.normalizeText(rawLabels[idx])||name;
            });
            if(names.length===0)return this.showMsg('chars','Selecciona personajes reales para borrarlos del disco','err');
            const preview=names.slice(0,4).map(name=>labels[name]||name).join(', ');
            const suffix=names.length>4?` y ${names.length-4} más`:'';
            if(!confirm(`Se van a borrar del disco y limpiar sus referencias:\n\n${preview}${suffix}\n\nEsto elimina chars/, moves/, roster y referencias del modo historia.`))return;
            try{
                const r=await fetch('/api/chars/delete',{

        selectedNonLabelRosterIndices(){
            return Array.from(this.sel.chars)
                .filter(i=>Number.isInteger(i)&&i>=0&&i<this.charRoster.length)
                .sort((a,b)=>a-b)
                .filter(i=>this.isCharEntry(this.charRoster[i]));

        sortRosterCharsAlphabetically(){
            const movableIdx=[];
            const movableItems=[];
            this.charRoster.forEach((item,idx)=>{
                if(!this.isCharEntry(item))return;
                if(this.isSlotLocked(item))return;
                const name=(item.name||'').trim();
                if(!name||name==='null'||name==='randomselect')return;
                movableIdx.push(idx);
                movableItems.push(item);
            });
            if(movableItems.length<2){
                return this.showMsg('chars','No hay suficientes chars libres para ordenar','ok');
            }
            movableItems.sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),undefined,{sensitivity:'base'}));
            movableIdx.forEach((idx,pos)=>{
                this.charRoster[idx]=this.normalizeRosterItem(movableItems[pos]);
            });
            this.clearSel('chars');
            this.showMsg('chars',`${movableItems.length} chars libres ordenados`,'ok');
        },
        replaceAllRosterCharsWithRandom(){
            const selected=this.selectedNonLabelRosterIndices();
            let changed=0;
            if(this.sel.chars.size>0){
                if(selected.length===0){
                    return this.showMsg('chars','La selección no contiene slots de personaje','err');
                }
                selected.forEach(idx=>{
                    const item=this.charRoster[idx];
                    const name=(item.name||'').trim();
                    if(!name||name==='null'||name==='randomselect')return;
                    this.charRoster[idx]=this.buildReplacementRosterItem(item,this.makeCharEntry('randomselect'));
                    changed+=1;
                });
            }else{
                this.charRoster=this.charRoster.map(item=>{
                    if(!this.isCharEntry(item))return item;
                    const name=(item.name||'').trim();
                    if(!name||name==='null'||name==='randomselect')return item;
                    changed+=1;
                    return this.buildReplacementRosterItem(item,this.makeCharEntry('randomselect'));
                });
                this.clearSel('chars');
            }
            if(changed===0){
                return this.showMsg('chars','No había chars válidos para reemplazar','ok');
            }
            this.syncCharUnusedFromRoster();
            this.showMsg('chars',`${changed} chars reemplazados por randomselect`,'ok');
        },
        replaceSelectedRosterWithInstalledChar(){
            if(!this.replaceCharTarget){
                return this.showMsg('chars','Elige primero un char instalado','err');
            }
            const selected=this.selectedNonLabelRosterIndices();
            if(selected.length===0){
                return this.showMsg('chars','Selecciona al menos un slot del roster','err');
            }
            let changed=0;
            selected.forEach(idx=>{
                const item=this.charRoster[idx];
                this.charRoster[idx]=this.buildReplacementRosterItem(item,this.makeInstalledCharEntry(this.replaceCharTarget));
                changed+=1;
            });
            this.syncCharUnusedFromRoster();
            if(changed===0){
                return this.showMsg('chars','No se pudo reemplazar la selección','err');
            }
            this.showMsg('chars',`${changed} slots reemplazados por ${this.replaceCharTarget}`,'ok');

        buildEmptyMovelist(charName){
            return {
                character:charName||'',
                charFolder:charName||'',
                version:'1.0',
                generated:'editor',
                sections:[{name:'Especiales',moves:[]}]
            };
        },
        isImportantMovelistMove(move){
            const name=((move&&move.name)||'').trim().toLowerCase();
            const input=((move&&move.input)||'').trim().toUpperCase();
            if(!name)return false;
            if (/^ai(?:\d+|[\s_-]|$)/.test(name)) return false;
            if (/^(ff|bb|dash|run|walk|recovery|taunt)$/.test(name)) return false;
            if (/^[abcxyzswd]$/.test(name)) return false;
            if (/^(up|down|back|fwd|forward|air|jump|crouch|stand)[_-]?[abcxyz]$/.test(name)) return false;
            if (/(jutsu|special|super|ultimate|secret|ougi|awakening|skill|technique|finisher)/.test(name)) return true;
            if (/(QCF|QCB|DP|RDP|HCF|HCB|CHARGE)/.test(input)) return true;
            if (((input.match(/[UDBF]/g) || []).length >= 2) && /[ABCXYZ]/.test(input)) return true;
            if (/\+/.test(input) && /[ABCXYZ]/.test(input)) return true;
            return false;
        },
        normalizeMovelistData(data,charName){
            const base=this.buildEmptyMovelist(charName);
            const safe={...base,...(data||{})};
            safe.character=safe.character||charName||'';
            safe.charFolder=safe.charFolder||charName||'';
            safe.sections=Array.isArray(safe.sections)?safe.sections.map(section=>({
                name:(section&&section.name)||'Nueva sección',
                moves:Array.isArray(section&&section.moves)?section.moves.map(move=>({
                    name:(move&&move.name)||'',
                    input:(move&&move.input)||'',
                    type:(move&&move.type)||'special'
                })).filter(move=>this.isImportantMovelistMove(move)):[] 
            })).filter(section=>section.moves.length > 0):[];
            return safe;
        },
        setMovelistMsg(message,ok=true){
            this.movelistMsg=message;
            this.movelistMsgOk=ok;
        },
        async loadMovelistCatalog(){
            this.movelistLoading=true;
            this.movelistMsg='';
            try{
                const [charsResp, listResp] = await Promise.all([
                    fetch('/api/chars'),
                    fetch('/api/movelist/list')
                ]);
                const charsData = await charsResp.json();
                const listData = await listResp.json();
                if(charsData.error)throw new Error(charsData.error);
                if(listData.error)throw new Error(listData.error);
                const hasJson = new Set(listData.chars || []);
                this.movelistChars = (charsData.available || []).map(item=>({
                    name:item.name,
                    hasJson:hasJson.has(item.name)
                }));
                if(!this.selectedMovelistChar || !this.movelistChars.some(char=>char.name===this.selectedMovelistChar)){
                    this.selectedMovelistChar=this.movelistChars[0]?this.movelistChars[0].name:'';
                }
                if(this.selectedMovelistChar){
                    await this.loadMovelistEditor(this.selectedMovelistChar);
                }else{
                    this.movelistEditor=null;
                }
            }catch(e){
                this.setMovelistMsg('No se pudo cargar la lista de personajes.',false);
            }
            this.movelistLoading=false;
        },

            if(!charName)return;
            this.selectedMovelistChar=charName;
            await this.loadMovelistEditor(charName);

        async loadMovelistEditor(charName){
            this.movelistLoading=true;
            this.dataIsLoading=true;
            try{
                const r=await fetch('/api/movelist/get?char='+encodeURIComponent(charName));
                const d=await r.json();
                if(d.movelist){
                    this.movelistEditor=this.normalizeMovelistData(d.movelist,charName);
                    this.setMovelistMsg('Move list cargada.',true);
                }else{
                    this.movelistEditor=this.buildEmptyMovelist(charName);
                    this.setMovelistMsg('Ese personaje todavía no tiene movelist.json.',false);
                }
            }catch(e){
                this.movelistEditor=this.buildEmptyMovelist(charName);
                this.setMovelistMsg('No se pudo leer la move list.',false);
            }
            this.dataIsLoading=false;
            if (this.historyIndex > -1 && !this.isRestoringState) {
                this.history[this.historyIndex].movelistEditor = this.movelistEditor ? JSON.parse(JSON.stringify(this.movelistEditor)) : null;
            }
            this.movelistLoading=false;
        },
        createEmptyMovelist(){
            if(!this.selectedMovelistChar)return;

                    this.movelistChars=this.movelistChars.map(char=>char.name===this.selectedMovelistChar?{...char,hasJson:true}:char);
                    let total=0;(d.movelist.sections||[]).forEach(section=>total+=(section.moves||[]).length);
                    this.setMovelistMsg(`${total} movimientos generados desde .cmd.`,true);
                }else{

                    await this.loadLifebars();
                    this.showMsg('lifebars',d.message||`${name} eliminada`,'ok');
                }else{
                    this.showMsg('lifebars',d.error||'No se pudo eliminar','err');
                }
            }catch(e){
                this.showMsg('lifebars','Error al eliminar lifebar','err');
            }
        },
        async renameChar(){
            const target=this.selectedRenameTarget;
            if(!target)return this.showMsg('chars',this.renameSelectionHint,'err');
            if(target.locked)return this.showMsg('chars','Libera primero el slot fijo','err');
            if(target.source==='roster'&&!this.renameDisk)return this.showMsg('chars','Activa renombrar carpeta en disco','err');
            const oldName=target.ref||target.name;
            const newName=this.normalizeText(this.renameNew);
            if(!newName)return;
            try{
                const payload={old_name:oldName,new_name:newName,rename_disk:true};
                if(target.source==='roster'&&target.idx>=0) payload.slot_index=target.idx;
                let r=await fetch('/api/chars/rename',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify(payload)
                });
                let d=await r.json();
                if(!d.success)return this.showMsg('chars',d.error,'err');
                const parts=[];
                if(Number(d.roster_renamed||0)>0)parts.push(`roster: ${d.roster_renamed}`);
                if(d.disk&&d.disk.char_dir_renamed)parts.push('chars/: ok');
                if(d.disk&&d.disk.move_dir_renamed)parts.push('moves/: ok');
                if(d.catalog&&Number(d.catalog.chapters_changed||0)>0)parts.push(`story: ${d.catalog.chapters_changed}`);
                const detail=parts.length?` (${parts.join(', ')})`:'';
                this.showMsg('chars',`${target.name} → ${newName}${detail}`,'ok');
                this.renameOld='';
                this.renameNew='';
                this.selectedAvailableCharName='';
                await Promise.all([this.loadChars(), this.loadData()]);
                if(this.activeTab==='movelists')await this.loadMovelistCatalog();
            }catch(e){
                this.showMsg('chars','Error','err');
            }
        },
        setPortraitParam(key,value){
            const t=this.portraitOffsetTarget;
            if(!t)return;
            const item=this.charRoster[t.idx];
            if(!item||!Array.isArray(item.extra_params))return;
            const lk=key.toLowerCase()+'=';
            const idx=item.extra_params.findIndex(p=>p.toLowerCase().startsWith(lk));
            const numVal=parseFloat(value);
            const isZero=!Number.isFinite(numVal)||numVal===0;
            if(isZero){
                /* remove param if value is 0 or empty */
                if(idx>=0) item.extra_params.splice(idx,1);
            } else {
                const param=`${key}=${numVal}`;
                if(idx>=0) item.extra_params[idx]=param;
                else item.extra_params.push(param);
            }
            this.tick++;
        },
        applyPortraitOffsetToAllSlots(){
            const t=this.portraitOffsetTarget;
            if(!t)return;
            const src=this.charRoster[t.idx];
            if(!src)return;
            const nameKey=this.normalizeText(src.name).toLowerCase();
            let count=0;
            for(let i=0;i<this.charRoster.length;i++){
                if(i===t.idx)continue;
                const other=this.charRoster[i];
                if(!this.isCharEntry(other))continue;
                if(this.normalizeText(other.name).toLowerCase()!==nameKey)continue;
                if(!Array.isArray(other.extra_params))other.extra_params=[];
                /* copy portrait params from source */
                for(const key of ['select_portrait_offset_x','select_portrait_offset_y','select_portrait_scale']){
                    const lk=key.toLowerCase()+'=';
                    const srcIdx=src.extra_params.findIndex(p=>p.toLowerCase().startsWith(lk));
                    const dstIdx=other.extra_params.findIndex(p=>p.toLowerCase().startsWith(lk));
                    if(srcIdx>=0){
                        if(dstIdx>=0) other.extra_params[dstIdx]=src.extra_params[srcIdx];
                        else other.extra_params.push(src.extra_params[srcIdx]);
                    } else {
                        if(dstIdx>=0) other.extra_params.splice(dstIdx,1);
                    }
                }
                count++;
            }
            this.tick++;
            this.showMsg('chars',`Portrait offset aplicado a ${count} slot(s) adicionales de "${t.name}"`,'ok');
        },
        async scanDisplaynames(){
            this.displaynameScan.loading=true;
            this.displaynameScan.items=[];
            this.displaynameScan.scanned=false;
            try{
                const r=await fetch('/api/chars/get-displaynames',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
                const d=await r.json();
                if(d.success){
                    this.displaynameScan.items=(d.chars||[]).map(c=>({...c,newDisplayname:''}));
                    this.displaynameScan.scanned=true;
                } else {
                    this.showMsg('chars',d.error||'Error al escanear','err');
                }
            }catch(e){
                this.showMsg('chars','Error de red','err');
            }
            this.displaynameScan.loading=false;
        },
        autoFillDisplaynames(){
            for(const item of this.displaynameScan.items){
                if(item.mismatch) item.newDisplayname=item.folder;
            }
        },
        async applyDisplaynameFixes(){
            const fixes=this.displaynameScan.items
                .filter(i=>i.mismatch && this.normalizeText(i.newDisplayname))
                .map(i=>({folder:i.folder,displayname:i.newDisplayname,update_name:true}));
            if(!fixes.length)return this.showMsg('chars','Nada que corregir. Escribe un nuevo displayname.','err');
            this.displaynameScan.applying=true;
            try{
                const r=await fetch('/api/chars/fix-displaynames',{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({fixes})
                });
                const d=await r.json();
                if(d.success){
                    this.showMsg('chars',`✅ ${d.fixed} displayname(s) corregidos`+(d.errors.length?`. Errores: ${d.errors.join(', ')}`:''),'ok');
                    await this.scanDisplaynames();
                } else {
                    this.showMsg('chars',d.error||'Error','err');
                }
            }catch(e){
                this.showMsg('chars','Error de red','err');
            }
            this.displaynameScan.applying=false;
        },
        async handleFileSelect(t,ev){ const files=Array.from(ev.target.files||[]);if(files.length)await this.uploadMultiple(t,files);ev.target.value='' },
        async handleFileDrop(t,ev){ ev.currentTarget.classList.remove('drag-active');const validExts=['.zip','.rar','.7z'];const files=Array.from(ev.dataTransfer.files).filter(f=>validExts.some(e=>f.name.toLowerCase().endsWith(e)));if(files.length)await this.uploadMultiple(t,files);else this.showMsg(t,'Solo .zip .rar .7z','err') },
        async uploadMultiple(t,files){
            const total=files.length;
            let ok=0,fail=0;
            for(let i=0;i<total;i++){
                this.showMsg(t,`⏳ Instalando ${i+1}/${total}: ${files[i].name}…`,'ok');
                try{
                    const fd=new FormData();fd.append('zipfile',files[i]);fd.append('type',t);
                    const r=await fetch('/api/upload',{method:'POST',body:fd});
                    const d=await r.json();
                    if(d.success) ok++; else { fail++; console.warn(`Error ${files[i].name}:`,d.error); }
                }catch(e){ fail++; }
            }
            if(t==='chars')this.loadChars();
            else if(t==='stages')this.loadStages();
            else if(t==='lifebars')this.loadLifebars();
            const msg=`✅ ${ok} instalado(s)`+(fail?`, ❌ ${fail} con error`:'');
            this.showMsg(t,msg,fail?'err':'ok');
        },
        onChapterDragStart(i,ev){
            if(!this.currentArc||!this.currentArc.chapters||!this.currentArc.chapters[i])return;
            this.storyDragIndex=i;
            this.storyDropIndex=i;
            ev.dataTransfer.effectAllowed='move';
        },
        onChapterDragOver(i){
            this.storyDropIndex=i;
        },
        onChapterDragLeave(i){
            if(this.storyDropIndex===i)this.storyDropIndex=-1;
        },
        onChapterDrop(i){
            if(!this.currentArc||!Array.isArray(this.currentArc.chapters))return this.onChapterDragEnd();
            const from=this.storyDragIndex;
            if(from<0||from===i)return this.onChapterDragEnd();
            const chapters=this.currentArc.chapters;
            const selected=this.currentChapter;
            const map=this.buildChapterVisualMap(this.currentArc);
            const dragged=chapters[from];
            const target=chapters[i];
            if(!target||!dragged)return this.onChapterDragEnd();

            const draggedBranchIdxs=this.getChapterBranchIndices(this.currentArc,from,map);
            if(draggedBranchIdxs.includes(i)){
                this.onChapterDragEnd();
                alert('No puedes soltar una rama dentro de sí misma ni dentro de uno de sus descendientes.');
                return;
            }

            const draggedBranchItems=this.getChapterBranchItems(this.currentArc,from,map);
            const remaining=chapters.filter((_,idx)=>!draggedBranchIdxs.includes(idx));

            let anchorItem=null;
            draggedBranchItems[0].type='sidestory';
            this.ensureChapterId(target,'cap');
            draggedBranchItems[0].sideUnlockAfter=target.id;
            const targetBranchIdxs=this.getChapterBranchIndices(this.currentArc,i,map);
            anchorItem=chapters[targetBranchIdxs[targetBranchIdxs.length-1]];

            const anchorPos=anchorItem?remaining.indexOf(anchorItem):-1;
            const insertAt=anchorPos>=0 ? anchorPos+1 : remaining.length;
            remaining.splice(insertAt,0,...draggedBranchItems);
            this.currentArc.chapters=remaining;

            const focusChapter=(selected&&remaining.includes(selected))?selected:draggedBranchItems[0];
            this.selectedChapterIndex=remaining.indexOf(focusChapter);
            this.onChapterDragEnd();
        },
        onChapterDragEnd(){
            this.storyDragIndex=-1;
            this.storyDropIndex=-1;
        },
        onDragStart(t,i,ev){
            if(t==='chars'&&this.isSlotLocked(this.charRoster[i])){
                ev.preventDefault();
                return;
            }
            this.dragState={type:t,idx:i,source:'roster',item:null,removeUnusedName:''};
            ev.dataTransfer.effectAllowed='move';
        },
        onDragOver(ev){ ev.currentTarget.classList.add('drag-over') },
        onDragLeave(ev){ ev.currentTarget.classList.remove('drag-over') },
        onDrop(t,i,ev){
            ev.currentTarget.classList.remove('drag-over');
            if(!this.dragState.type||this.dragState.type!==t)return;
            const l=this.getList(t);
            const insertAtBase=this.computeDropInsertIndex(t,i,ev);
            const isExisting=Number.isInteger(this.dragState.idx)&&this.dragState.idx>=0;

            if(isExisting){
                if(this.dragState.idx===i&&insertAtBase===i){
                    return this.clearDragState();
                }
                if(t==='chars'&&(this.isSlotLocked(l[this.dragState.idx])||this.isSlotLocked(l[i]))){
                    this.clearDragState();
                    return this.showMsg('chars','No puedes mover slots fijos','err');
                }
                const item=l.splice(this.dragState.idx,1)[0];
                let insertAt=insertAtBase;
                if(this.dragState.idx<insertAt)insertAt-=1;
                insertAt=Math.max(0,Math.min(l.length,insertAt));
                l.splice(insertAt,0,item);
                if(t==='chars'){
                    this.sel.chars.clear();
                    this.sel.chars.add(insertAt);
                    this.lastClicked.chars=insertAt;
                    this.tick++;
                }
                this.clearDragState();
                return;
            }
            if(t==='chars'&&this.dragState.item){
                let mode=this.computeExternalDropMode(ev);
                if(mode==='replace'){
                    if(this.isSlotLocked(l[i])){
                        this.clearDragState();
                        return this.showMsg('chars','No puedes reemplazar un slot fijo','err');
                    }
                    if(this.isCharEntry(l[i])){
                        this.charRoster[i]=this.buildReplacementRosterItem(l[i],this.dragState.item);
                        this.syncCharUnusedFromRoster();
                        this.sel.chars.clear();
                        this.sel.chars.add(i);
                        this.lastClicked.chars=i;
                        this.tick++;
                        this.clearDragState();
                        return this.showMsg('chars','Reemplazado','ok');
                    }
                    mode='after';
                }
                const insertAt=mode==='after'?i+1:i;
                if(this.isSlotLocked(l[i])&&insertAt<=i){
                    this.clearDragState();
                    return this.showMsg('chars','No puedes insertar antes de un slot fijo','err');
                }
                this.insertRosterItem('chars',this.dragState.item,{
                    index:insertAt,
                    removeUnusedName:this.dragState.removeUnusedName||'',
                });
                this.clearDragState();
                return this.showMsg('chars','Agregado','ok');
            }
            this.clearDragState();
        },
        onDropToEnd(t,ev){
            ev.currentTarget.classList.remove('drag-over');
            if(!this.dragState.type||this.dragState.type!==t)return;
            const l=this.getList(t);
            const isExisting=Number.isInteger(this.dragState.idx)&&this.dragState.idx>=0;
            if(isExisting){
                if(t==='chars'&&this.isSlotLocked(l[this.dragState.idx])){
                    this.clearDragState();
                    return this.showMsg('chars','No puedes mover slots fijos','err');
                }
                const item=l.splice(this.dragState.idx,1)[0];
                l.push(item);
                if(t==='chars'){
                    const idx=l.length-1;
                    this.sel.chars.clear();
                    this.sel.chars.add(idx);
                    this.lastClicked.chars=idx;
                    this.tick++;
                }
                this.clearDragState();
                return;
            }
            if(t==='chars'&&this.dragState.item){
                this.insertRosterItem('chars',this.dragState.item,{
                    index:l.length,
                    removeUnusedName:this.dragState.removeUnusedName||'',
                });
                this.clearDragState();
                return this.showMsg('chars','Agregado','ok');
            }
            this.clearDragState();
        },
        showMsg(t,m,tp){ this.msg[t]=m;this.msgType[t]=tp;setTimeout(()=>this.msg[t]='',4000) }
    },
    mounted(){ 
        this.checkStatus();
        window.addEventListener('keydown', this.handleKeydown);
    },
    unmounted(){
        window.removeEventListener('keydown', this.handleKeydown);
    }
}).mount('#app');
</script>
